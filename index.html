<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PoC | 작은 서커스</title>
<style>
  :root {
    --ink: #f8efd7;
    --muted: #b8af9f;
    --night: #121626;
    --panel: #24293c;
    --panel-2: #30374e;
    --line: #4f576d;
    --red: #d95656;
    --red-dark: #8c303b;
    --gold: #f4c95d;
    --green: #66c47d;
    --blue: #67aee5;
    --shadow: #070912;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; min-height: 100%; background: #0e111d; }
  body {
    padding: 14px;
    color: var(--ink);
    font-family: "Malgun Gothic", "Segoe UI", sans-serif;
    background: linear-gradient(#171b2d 0 68%, #0e111d 68% 100%);
  }
  button { font: inherit; }
  button:focus-visible { outline: 3px solid #fff1a6; outline-offset: 3px; }

  .game-shell {
    width: min(960px, 100%);
    margin: 0 auto;
    background: var(--night);
    border: 3px solid #050711;
    box-shadow: 0 12px 0 #070912, 0 20px 44px #0009;
  }
  .marquee {
    min-height: 68px;
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    position: relative;
    background: #20253a;
    border-bottom: 3px solid #090b15;
  }
  .marquee::after {
    content: "";
    position: absolute;
    left: 0; right: 0; bottom: -3px;
    height: 3px;
    background: repeating-linear-gradient(90deg, var(--gold) 0 14px, var(--red) 14px 28px);
  }
  .brand-row { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .brand { padding: 5px 6px; color: var(--gold); border: 2px solid var(--gold); font: 900 13px/1 Consolas, monospace; }
  h1 { margin: 0; font-size: 20px; letter-spacing: 0; }
  .town { margin-top: 3px; color: var(--muted); font-size: 11px; }
  .hud { display: flex; align-items: center; gap: 7px; }
  .hud-item {
    min-width: 74px;
    display: grid;
    grid-template-columns: 20px auto;
    grid-template-rows: 12px 20px;
    column-gap: 6px;
    align-items: center;
    padding: 5px 7px;
    background: #151828;
    border: 2px solid #3b4258;
  }
  .hud-icon { grid-row: 1 / span 2; width: 19px; height: 19px; position: relative; }
  .coin-icon { border-radius: 50%; background: var(--gold); border: 3px solid #9f6c22; box-shadow: inset 0 0 0 2px #ffe69b; }
  .day-icon { border: 3px solid var(--blue); border-radius: 50%; }
  .day-icon::after { content: ""; position: absolute; left: 6px; top: 1px; width: 3px; height: 7px; background: var(--blue); transform: rotate(28deg); transform-origin: bottom; }
  .rep-icon { background: var(--gold); clip-path: polygon(50% 0,61% 35%,100% 38%,69% 59%,79% 100%,50% 76%,21% 100%,31% 59%,0 38%,39% 35%); }
  .hud-label { color: var(--muted); font-size: 9px; line-height: 12px; }
  .hud-value { color: var(--ink); font: 900 17px/20px Consolas, monospace; }
  .sound-btn { width: 34px; height: 34px; padding: 0; position: relative; cursor: pointer; background: #151828; border: 2px solid #4a5268; }
  .speaker { position: absolute; left: 8px; top: 11px; width: 8px; height: 10px; background: var(--ink); }
  .speaker::before { content: ""; position: absolute; left: 6px; top: -4px; border-top: 9px solid transparent; border-bottom: 9px solid transparent; border-left: 9px solid var(--ink); }
  .speaker::after { content: ""; position: absolute; left: 15px; top: 0; width: 7px; height: 7px; border: 2px solid var(--gold); border-left: 0; border-bottom: 0; transform: rotate(45deg); }
  .sound-btn.muted::after { content: ""; position: absolute; left: 7px; top: 15px; width: 22px; height: 3px; background: var(--red); transform: rotate(-45deg); }

  .scene-frame { position: relative; overflow: hidden; background: #090b14; border-bottom: 3px solid #080a14; }
  canvas { display: block; width: 100%; height: auto; aspect-ratio: 96 / 53; image-rendering: pixelated; }
  .phase-banner {
    position: absolute;
    left: 50%; top: 16px;
    min-width: 190px;
    padding: 8px 14px;
    z-index: 12;
    opacity: 0;
    pointer-events: none;
    color: #211b16;
    background: var(--gold);
    border: 3px solid #fff0a8;
    box-shadow: 0 4px 0 #79501d;
    font-size: 14px;
    font-weight: 900;
    text-align: center;
    transform: translate(-50%, -12px);
    transition: opacity .15s, transform .15s;
  }
  .phase-banner.on { opacity: 1; transform: translate(-50%, 0); }
  .show-timer { position: absolute; left: 16px; right: 16px; top: 12px; height: 12px; z-index: 9; display: none; background: #111523; border: 2px solid #eee4cb; }
  .show-timer.on { display: block; }
  .show-timer-fill { width: 0; height: 100%; background: var(--gold); transition: width .08s linear; }

  .station-layer { position: absolute; inset: 0; z-index: 8; pointer-events: none; }
  .station-button {
    position: absolute;
    width: 94px; height: 94px;
    display: none;
    place-items: center;
    padding: 4px;
    pointer-events: auto;
    cursor: pointer;
    color: var(--ink);
    background: #15192bea;
    border: 3px solid #f0e6ce;
    border-radius: 50%;
    box-shadow: 0 6px 0 #080a13, 0 0 0 4px #0006;
    transform: translate(-50%, -50%);
    transition: transform .12s, border-color .12s, background .12s;
  }
  .station-button.on { display: grid; }
  .station-button:hover:not(:disabled) { transform: translate(-50%, -55%); border-color: var(--gold); }
  .station-button:active:not(:disabled) { transform: translate(-50%, -46%); }
  .station-button:disabled { cursor: default; opacity: .72; }
  .station-button.urgent { border-color: #fff0a8; background: #6a3f25ed; animation: urgent .55s steps(2, end) infinite; }
  .station-button.staffed { border-color: var(--green); background: #173127e8; }
  @keyframes urgent { 50% { box-shadow: 0 6px 0 #080a13, 0 0 0 8px #f4c95d66; } }
  .station-icon { width: 42px; height: 35px; position: relative; }
  .ticket-art { background: #efd18d; border: 3px solid #795633; transform: rotate(-6deg); }
  .ticket-art::after { content: ""; position: absolute; left: 18px; top: 3px; bottom: 3px; border-left: 2px dashed #a3702e; }
  .light-art { width: 40px; height: 40px; border-radius: 50%; background: #55515e; border: 4px solid #2a2932; }
  .station-button.urgent .light-art { background: var(--gold); border-color: #fff0a8; box-shadow: 0 0 18px #f4c95d; }
  .station-copy { display: block; margin-top: 3px; font-size: 10px; font-weight: 900; line-height: 1.2; }
  .staff-mark { position: absolute; left: -7px; top: -7px; width: 29px; height: 29px; display: grid; place-items: center; color: #241d18; background: #efc7a2; border: 2px solid #4b3130; border-radius: 50%; font-size: 9px; font-weight: 900; }
  .station-button::after {
    content: attr(data-tip);
    position: absolute;
    left: 50%; top: calc(100% + 9px);
    width: max-content;
    max-width: 210px;
    padding: 7px 9px;
    opacity: 0;
    pointer-events: none;
    color: var(--ink);
    background: #0f1320f2;
    border: 2px solid var(--gold);
    font-size: 10px;
    line-height: 1.4;
    transform: translateX(-50%) translateY(-4px);
    transition: opacity .12s, transform .12s;
  }
  .station-button:hover::after, .station-button:focus-visible::after { opacity: 1; transform: translateX(-50%) translateY(0); }
  #ticketButton { left: 84%; top: 68%; }
  #lightButton { left: 18%; top: 27%; }

  .control-area { min-height: 174px; padding: 10px; background: #1c2133; }
  .plan-panel, .live-panel, .result-panel, .final-panel { display: none; }
  .plan-panel.on, .live-panel.on, .result-panel.on, .final-panel.on { display: block; }
  .section-title { margin: 2px 0 8px; color: var(--gold); font-size: 11px; font-weight: 900; }
  .plan-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .plan-button {
    min-height: 112px;
    display: grid;
    grid-template-columns: 86px 1fr;
    align-items: center;
    gap: 12px;
    padding: 10px;
    cursor: pointer;
    color: var(--ink);
    background: var(--panel);
    border: 3px solid var(--line);
    text-align: left;
    transition: transform .12s, border-color .12s, background .12s;
  }
  .plan-button:hover:not(:disabled) { transform: translateY(-3px); border-color: var(--gold); background: var(--panel-2); }
  .plan-button:active:not(:disabled) { transform: translateY(1px); }
  .plan-button:disabled { opacity: .38; cursor: default; }
  .plan-button strong { display: block; margin-bottom: 5px; font-size: 16px; }
  .plan-button small { display: block; color: var(--muted); font-size: 10px; line-height: 1.55; }
  .plan-art { width: 82px; height: 70px; position: relative; overflow: hidden; background: #171a29; border: 2px solid #444b61; }
  .plan-art::before { content: ""; position: absolute; left: 12px; right: 12px; bottom: 9px; height: 34px; background: repeating-linear-gradient(90deg, var(--red) 0 12px, #efd18d 12px 24px); }
  .plan-art::after { content: ""; position: absolute; left: 5px; bottom: 41px; border-left: 34px solid transparent; border-right: 34px solid transparent; border-top: 25px solid var(--red-dark); }
  .plan-art.big::before { left: 5px; right: 5px; height: 42px; }
  .plan-art.big::after { left: -4px; bottom: 49px; border-left-width: 43px; border-right-width: 43px; border-top-width: 28px; }
  .plan-stars { position: absolute; left: 50%; bottom: 15px; z-index: 2; color: var(--gold); font-size: 14px; transform: translateX(-50%); white-space: nowrap; }

  .live-top { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; }
  .live-stat { min-height: 44px; display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 7px 9px; background: var(--panel); border: 2px solid var(--line); }
  .live-stat span { color: var(--muted); font-size: 9px; }
  .live-stat strong { font: 900 18px/1 Consolas, monospace; }
  .stage-control { min-height: 82px; display: grid; grid-template-columns: 1fr 132px 132px; align-items: stretch; gap: 8px; margin-top: 8px; }
  .stage-message { display: flex; align-items: center; gap: 10px; padding: 9px 11px; background: #171a2a; border: 2px solid #454d63; }
  .stage-symbol { width: 42px; height: 42px; flex: 0 0 42px; position: relative; border: 4px solid var(--blue); border-radius: 50%; }
  .stage-symbol::before, .stage-symbol::after { content: ""; position: absolute; top: 12px; width: 9px; height: 9px; border-radius: 50%; background: var(--gold); }
  .stage-symbol::before { left: -7px; }
  .stage-symbol::after { right: -7px; }
  .stage-copy strong { display: block; margin-bottom: 4px; font-size: 12px; }
  .stage-copy span { display: block; color: var(--muted); font-size: 10px; line-height: 1.35; }
  .decision-button { min-height: 78px; cursor: pointer; color: white; border: 3px solid; font-size: 13px; font-weight: 900; box-shadow: 0 5px 0 #080a13; }
  .decision-button:active:not(:disabled) { transform: translateY(4px); box-shadow: 0 1px 0 #080a13; }
  .decision-button:disabled { opacity: .28; cursor: default; filter: grayscale(.8); }
  .continue-button { background: #b94d50; border-color: #ff8b79; }
  .finish-button { background: #397850; border-color: #83d39a; }
  .staff-row { min-height: 25px; display: flex; align-items: center; gap: 6px; margin-top: 7px; overflow-x: auto; }
  .staff-empty { color: #7e879e; font-size: 10px; }
  .staff-pill { display: inline-flex; align-items: center; gap: 5px; padding: 4px 7px; white-space: nowrap; color: #d9f5df; background: #183126; border: 1px solid #477c59; font-size: 9px; }
  .staff-face { width: 16px; height: 16px; display: inline-block; background: #efc7a2; border: 2px solid #4b3130; border-radius: 50%; }

  .result-title { margin-bottom: 8px; padding: 8px 10px; color: var(--gold); background: #171a2a; border: 2px solid #454d63; font-size: 11px; font-weight: 900; text-align: center; }
  .result-head { display: grid; grid-template-columns: repeat(4, 1fr); gap: 7px; margin-bottom: 9px; }
  .result-stat { padding: 8px 10px; display: flex; align-items: center; justify-content: space-between; gap: 8px; background: var(--panel); border: 2px solid var(--line); }
  .result-stat span { color: var(--muted); font-size: 9px; }
  .result-stat strong { font: 900 18px/1 Consolas, monospace; }
  .investments { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px; }
  .invest-card { min-height: 90px; display: grid; grid-template-rows: 1fr auto; gap: 6px; padding: 8px; cursor: pointer; color: var(--ink); background: var(--panel); border: 2px solid var(--line); text-align: left; transition: transform .12s, border-color .12s, background .12s; }
  .invest-card:hover:not(:disabled) { transform: translateY(-3px); border-color: var(--gold); background: var(--panel-2); }
  .invest-card:disabled { opacity: .34; cursor: default; }
  .invest-card strong { display: block; margin-bottom: 3px; font-size: 11px; }
  .invest-card small { display: block; color: var(--muted); font-size: 9px; line-height: 1.4; }
  .price { justify-self: end; color: var(--gold); font: 900 14px/1 Consolas, monospace; }
  .skip-invest { margin-top: 8px; padding: 7px 10px; cursor: pointer; color: var(--muted); background: transparent; border: 1px solid #596279; }
  .skip-invest:hover { color: var(--ink); border-color: var(--muted); }
  .final-panel { padding: 18px; text-align: center; }
  .final-panel h2 { margin: 0 0 8px; color: var(--gold); }
  .final-panel p { margin: 0 0 16px; color: var(--muted); line-height: 1.6; }
  .restart-btn { padding: 11px 28px; cursor: pointer; color: white; background: var(--red); border: 3px solid #ff8b79; box-shadow: 0 4px 0 var(--red-dark); font-weight: 900; }

  @media (max-width: 760px) {
    body { padding: 0; }
    .game-shell { border-left: 0; border-right: 0; }
    .marquee { grid-template-columns: 1fr; }
    .hud { justify-content: space-between; gap: 4px; }
    .hud-item { flex: 1; min-width: 0; }
    .sound-btn { width: 32px; height: 32px; flex: 0 0 32px; }
    .plan-options { grid-template-columns: 1fr; }
    .plan-button { min-height: 92px; grid-template-columns: 72px 1fr; }
    .plan-art { width: 68px; height: 58px; }
    .station-button { width: 76px; height: 76px; }
    .station-icon { transform: scale(.78); }
    .station-copy { font-size: 9px; }
    .stage-control { grid-template-columns: 1fr 96px 96px; }
    .stage-message { min-width: 0; }
    .stage-symbol { display: none; }
    .decision-button { min-height: 70px; font-size: 11px; }
    .result-head { grid-template-columns: 1fr 1fr; }
    .investments { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
<div class="game-shell">
  <header class="marquee">
    <div class="brand-row">
      <span class="brand">PoC</span>
      <div>
        <h1>작은 서커스</h1>
        <div class="town" id="townLabel">첫 번째 마을 · 오늘 공연</div>
      </div>
    </div>
    <div class="hud">
      <div class="hud-item"><span class="hud-icon coin-icon"></span><span class="hud-label">돈</span><span class="hud-value" id="moneyValue">10</span></div>
      <div class="hud-item"><span class="hud-icon day-icon"></span><span class="hud-label">날짜</span><span class="hud-value" id="dayValue">1/4</span></div>
      <div class="hud-item"><span class="hud-icon rep-icon"></span><span class="hud-label">평판</span><span class="hud-value" id="repValue">0</span></div>
      <button class="sound-btn" id="soundButton" aria-label="소리 켜기 또는 끄기" title="소리"><span class="speaker"></span></button>
    </div>
  </header>

  <section class="scene-frame">
    <canvas id="scene" width="960" height="530" aria-label="서커스 공연 운영 장면"></canvas>
    <div class="show-timer" id="showTimer"><div class="show-timer-fill" id="showTimerFill"></div></div>
    <div class="phase-banner" id="phaseBanner"></div>
    <div class="station-layer">
      <button class="station-button" id="lightButton" data-tip="불이 반짝일 때 누르면 관객의 박수가 커짐" aria-label="조명 신호 처리">
        <span class="station-icon light-art"></span><span class="station-copy" id="lightCopy">신호 대기</span>
      </button>
      <button class="station-button" id="ticketButton" data-tip="줄 선 관객 한 명을 입장시켜 표 수입 획득" aria-label="매표 처리">
        <span class="station-icon ticket-art"></span><span class="station-copy" id="ticketCopy">대기 0</span>
      </button>
    </div>
  </section>

  <main class="control-area">
    <section class="plan-panel on" id="planPanel">
      <div class="section-title">오늘 올릴 공연</div>
      <div class="plan-options" id="planOptions"></div>
    </section>

    <section class="live-panel" id="livePanel">
      <div class="live-top">
        <div class="live-stat"><span>입장</span><strong id="liveAudience">0/0</strong></div>
        <div class="live-stat"><span>조명 성공</span><strong id="liveLights">0</strong></div>
        <div class="live-stat"><span>무대 수입</span><strong id="liveStage">0</strong></div>
      </div>
      <div class="stage-control">
        <div class="stage-message">
          <span class="stage-symbol"></span>
          <span class="stage-copy"><strong id="stageTitle">첫 묘기 준비</strong><span id="stageDetail">공연이 시작되면 단원을 지켜보세요.</span></span>
        </div>
        <button class="decision-button continue-button" id="continueButton" disabled>한 번 더</button>
        <button class="decision-button finish-button" id="finishButton" disabled>마무리</button>
      </div>
      <div class="staff-row" id="staffRow"></div>
    </section>

    <section class="result-panel" id="resultPanel">
      <div class="result-title" id="resultTitle"></div>
      <div class="result-head">
        <div class="result-stat"><span>입장</span><strong id="resultAudience">0</strong></div>
        <div class="result-stat"><span>관객 반응</span><strong id="resultMood">0%</strong></div>
        <div class="result-stat"><span>매출</span><strong id="resultGross">+0</strong></div>
        <div class="result-stat"><span>비용 후</span><strong id="resultNet">+0</strong></div>
      </div>
      <div class="section-title">오늘 번 돈으로 하나 선택</div>
      <div class="investments" id="investments"></div>
      <button class="skip-invest" id="skipInvest">저축하고 다음 날</button>
    </section>

    <section class="final-panel" id="finalPanel">
      <h2>첫 마을 공연 종료</h2>
      <p id="finalSummary"></p>
      <button class="restart-btn" id="restartButton">처음부터</button>
    </section>
  </main>
</div>

<script>
(() => {
  'use strict';

  const canvas = document.getElementById('scene');
  const ctx = canvas.getContext('2d');
  const $ = id => document.getElementById(id);
  const clamp = (value, min, max) => Math.max(min, Math.min(max, value));
  const COLORS = ['#d9715d', '#e0a94f', '#67aee5', '#66c47d', '#9a7bd8'];
  const MAX_DAYS = 4;
  const COUNTDOWN_MS = 1800;

  const SHOWS = {
    small: {
      name: '작은 공연', detail: '관객 6명 · 조명 신호 3회 · 운영비 없음', stars: '★',
      duration: 16000, audience: 6, arrivalEvery: 2200, cues: [2600, 7000, 11200], maxTricks: 3,
      trickRewards: [3, 5, 8], risks: [0, .12, .32], cost: 0,
    },
    big: {
      name: '큰 공연', detail: '관객 10명 · 조명 신호 5회 · 운영비 4', stars: '★★★',
      duration: 19500, audience: 10, arrivalEvery: 1600, cues: [2200, 5100, 8100, 11600, 15300], maxTricks: 4,
      trickRewards: [4, 7, 11, 16], risks: [0, .15, .33, .50], cost: 4,
    },
  };

  const JOBS = {
    ticket: { name: '매표', worker: '마리', hire: 10, wage: 1, bonus: '1.1초마다 관객 자동 입장', color: '#66c47d' },
    light: { name: '조명', worker: '에디', hire: 11, wage: 1, bonus: '조명 신호 자동 처리', color: '#e0a94f' },
    stage: { name: '무대 진행', worker: '로만', hire: 12, wage: 2, bonus: '보통 방침으로 묘기 판단', color: '#67aee5' },
  };

  let state;
  let live = null;
  let result = null;
  let animationId = 0;
  let bannerTimer = 0;
  let soundOn = true;
  let audioContext = null;

  function freshState() {
    return {
      day: 1,
      money: 10,
      reputation: 0,
      phase: 'plan',
      showKey: null,
      employees: {},
      seatLevel: 0,
    };
  }

  function resetGame() {
    cancelAnimationFrame(animationId);
    state = freshState();
    live = null;
    result = null;
    showPanel('planPanel');
    $('showTimer').classList.remove('on');
    hideStations();
    renderAll();
    drawScene(0);
  }

  function showPanel(panelId) {
    ['planPanel', 'livePanel', 'resultPanel', 'finalPanel'].forEach(id => $(id).classList.toggle('on', id === panelId));
  }

  function renderAll() {
    $('moneyValue').textContent = state.money;
    $('dayValue').textContent = `${state.day}/${MAX_DAYS}`;
    $('repValue').textContent = state.reputation;
    $('townLabel').textContent = state.phase === 'plan' ? '첫 번째 마을 · 오늘 공연'
      : state.phase === 'live' ? `첫 번째 마을 · ${SHOWS[state.showKey].name} 운영 중`
      : '첫 번째 마을 · 오늘 정산';
    renderPlans();
    renderStaff();
    if (state.phase === 'live') renderLive();
  }

  function renderPlans() {
    $('planOptions').innerHTML = Object.entries(SHOWS).map(([key, show]) => {
      const note = key === 'big' && !Object.keys(state.employees).length ? ' · 직원 없이 매우 바쁨' : '';
      return `<button class="plan-button" data-show="${key}">
        <span class="plan-art ${key === 'big' ? 'big' : ''}"><span class="plan-stars">${show.stars}</span></span>
        <span><strong>${show.name}</strong><small>${show.detail}${note}</small></span>
      </button>`;
    }).join('');
    document.querySelectorAll('[data-show]').forEach(button => button.addEventListener('click', () => startShow(button.dataset.show)));
  }

  function renderStaff() {
    const entries = Object.entries(state.employees);
    $('staffRow').innerHTML = entries.length ? entries.map(([jobKey, employee]) =>
      `<span class="staff-pill"><span class="staff-face"></span>${employee.name} · ${JOBS[jobKey].name} 자동</span>`).join('')
      : '<span class="staff-empty">직원 없음 · 세 업무를 단장이 직접 처리</span>';
  }

  function startShow(showKey) {
    if (state.phase !== 'plan' || !SHOWS[showKey]) return;
    state.phase = 'live';
    state.showKey = showKey;
    result = null;
    const show = SHOWS[showKey];
    live = {
      start: performance.now() + COUNTDOWN_MS,
      elapsed: -COUNTDOWN_MS,
      endAt: show.duration,
      arrived: 0,
      queue: 0,
      admitted: 0,
      left: 0,
      nextTicketAuto: 0,
      ticketCooldown: 0,
      cueIndex: 0,
      activeCue: null,
      cueHits: 0,
      cueMisses: 0,
      trick: 1,
      trickBank: 0,
      securedStage: 0,
      stageSuccesses: 0,
      stageState: 'performing',
      stageTitle: '첫 묘기 준비',
      stageDetail: '공연 시작과 함께 첫 묘기가 올라갑니다.',
      nextStageAt: 3000,
      decisionDeadline: 0,
      autoDecisionAt: 0,
      stageFailed: false,
    };
    showPanel('livePanel');
    $('showTimer').classList.add('on');
    $('ticketButton').classList.add('on');
    $('lightButton').classList.add('on');
    applyStaffMarks();
    renderAll();
    setBanner('문을 엽니다');
    playSequence([220, 330, 440]);
    animationId = requestAnimationFrame(showLoop);
  }

  function applyStaffMarks() {
    [['ticketButton', 'ticket'], ['lightButton', 'light']].forEach(([buttonId, jobKey]) => {
      const button = $(buttonId);
      const staffed = Boolean(state.employees[jobKey]);
      button.classList.toggle('staffed', staffed);
      button.disabled = staffed;
      button.querySelectorAll('.staff-mark').forEach(mark => mark.remove());
      if (staffed) button.insertAdjacentHTML('afterbegin', `<span class="staff-mark">${JOBS[jobKey].worker.slice(0, 1)}</span>`);
    });
  }

  function hideStations() {
    $('ticketButton').classList.remove('on', 'urgent', 'staffed');
    $('lightButton').classList.remove('on', 'urgent', 'staffed');
  }

  function showLoop(now) {
    if (state.phase !== 'live') return;
    live.elapsed = now - live.start;
    if (live.elapsed >= 0) updateLive();
    const progress = clamp(live.elapsed / live.endAt, 0, 1);
    $('showTimerFill').style.width = `${progress * 100}%`;
    renderLive();
    drawScene(live.elapsed);
    if (live.elapsed >= live.endAt) finishShow();
    else animationId = requestAnimationFrame(showLoop);
  }

  function updateLive() {
    const show = SHOWS[state.showKey];
    const expectedArrivals = Math.min(show.audience, Math.floor(live.elapsed / show.arrivalEvery) + 1);
    while (live.arrived < expectedArrivals) {
      live.arrived++;
      if (live.queue >= 4 || live.admitted >= capacityForShow()) {
        live.left++;
        setBanner('기다리던 관객이 떠났습니다');
      } else {
        live.queue++;
        playTone(270, .05, 'square', .018);
      }
    }

    if (state.employees.ticket && live.queue > 0 && live.elapsed >= live.nextTicketAuto) {
      admitAudience(true);
      live.nextTicketAuto = live.elapsed + 1100;
    }

    updateLightCue(show);
    updateStage(show);
  }

  function updateLightCue(show) {
    if (!live.activeCue && live.cueIndex < show.cues.length && live.elapsed >= show.cues[live.cueIndex]) {
      live.activeCue = { start: live.elapsed, end: live.elapsed + 2300, handled: false };
      live.cueIndex++;
      playTone(760, .08, 'square', .035);
    }
    if (!live.activeCue) return;
    if (state.employees.light && !live.activeCue.handled && live.elapsed >= live.activeCue.start + 480) hitLight(true);
    if (live.activeCue && !live.activeCue.handled && live.elapsed > live.activeCue.end) {
      live.cueMisses++;
      live.activeCue = null;
      setBanner('조명이 늦었습니다');
      playTone(140, .12, 'sawtooth', .025);
    }
  }

  function updateStage(show) {
    if (live.stageState === 'performing' && live.elapsed >= live.nextStageAt) resolveTrick(show);
    if (live.stageState !== 'decision') return;
    if (state.employees.stage && live.elapsed >= live.autoDecisionAt) {
      const nextRisk = show.risks[live.trick] ?? 1;
      if (live.trick < show.maxTricks && nextRisk <= .33 && live.elapsed < show.duration - 3000) continueTrick(true);
      else finishStage(true);
    } else if (!state.employees.stage && live.elapsed >= live.decisionDeadline) {
      finishStage(false, '망설이는 사이 단원이 마무리했습니다');
    }
  }

  function resolveTrick(show) {
    const risk = show.risks[live.trick - 1];
    const failed = live.trick > 1 && Math.random() < risk;
    if (failed) {
      live.trickBank = Math.floor(live.trickBank / 2);
      live.securedStage = live.trickBank;
      live.stageFailed = true;
      live.stageState = 'finished';
      live.stageTitle = '묘기 실수';
      live.stageDetail = `무대 수입 ${live.securedStage}만 남기고 공연 종료`;
      live.endAt = Math.min(live.endAt, live.elapsed + 1700);
      setBanner('묘기가 무너졌습니다');
      playSequence([220, 160, 100]);
      return;
    }

    const reward = show.trickRewards[live.trick - 1];
    live.trickBank += reward;
    live.stageSuccesses++;
    playSequence([520, 660, 820]);
    if (live.trick >= show.maxTricks) {
      finishStage(Boolean(state.employees.stage), '모든 묘기 성공');
      return;
    }

    const nextRisk = Math.round(show.risks[live.trick] * 100);
    live.stageState = 'decision';
    live.stageTitle = `${live.trick}번째 묘기 성공 · 수입 ${live.trickBank}`;
    live.stageDetail = `다음 묘기 실수 가능성 ${nextRisk}%`;
    live.decisionDeadline = live.elapsed + 4400;
    live.autoDecisionAt = live.elapsed + 750;
    setBanner('박수가 커집니다');
  }

  function continueTrick(auto = false) {
    if (state.phase !== 'live' || live.stageState !== 'decision') return;
    live.trick++;
    live.stageState = 'performing';
    live.nextStageAt = live.elapsed + 1750;
    live.stageTitle = `${live.trick}번째 묘기 진행`;
    live.stageDetail = auto ? `${JOBS.stage.worker}이 공연을 이어갑니다.` : '단원이 더 어려운 묘기를 시작합니다.';
    setBanner(auto ? '무대 감독 · 한 번 더' : '한 번 더 갑니다');
    playTone(430, .1, 'square', .035);
  }

  function finishStage(auto = false, message = '') {
    if (state.phase !== 'live' || !['decision', 'performing'].includes(live.stageState)) return;
    live.securedStage = live.trickBank;
    live.stageState = 'finished';
    live.stageTitle = '공연 마무리';
    live.stageDetail = message || `무대 수입 ${live.securedStage} 확정`;
    live.endAt = Math.min(live.endAt, live.elapsed + 1700);
    setBanner(auto ? '무대 감독 · 마무리' : '현재 흥행을 확정했습니다');
    playSequence([620, 780, 980]);
  }

  function admitAudience(auto = false) {
    if (state.phase !== 'live' || live.elapsed < 0 || live.queue <= 0 || live.admitted >= capacityForShow()) return;
    if (!auto && live.elapsed < live.ticketCooldown) return;
    live.queue--;
    live.admitted++;
    live.ticketCooldown = live.elapsed + 380;
    setBanner(auto ? `${JOBS.ticket.worker} · 관객 입장` : '표 한 장 판매');
    playTone(600, .06, 'square', .025);
  }

  function hitLight(auto = false) {
    if (state.phase !== 'live' || !live.activeCue || live.activeCue.handled) return;
    live.activeCue.handled = true;
    live.cueHits++;
    live.activeCue = null;
    setBanner(auto ? `${JOBS.light.worker} · 조명 성공` : '조명 성공 · 박수 증가');
    playSequence([700, 900]);
  }

  function capacityForShow() {
    const base = state.showKey === 'big' ? 8 : 6;
    return base + state.seatLevel * 2;
  }

  function renderLive() {
    if (!live) return;
    const show = SHOWS[state.showKey];
    $('liveAudience').textContent = `${live.admitted}/${Math.min(show.audience, capacityForShow())}`;
    $('liveLights').textContent = live.cueHits;
    $('liveStage').textContent = live.stageState === 'finished' ? live.securedStage : live.trickBank;
    $('stageTitle').textContent = live.stageTitle;
    $('stageDetail').textContent = state.employees.stage && live.stageState !== 'finished'
      ? `${live.stageDetail} · ${JOBS.stage.worker} 자동 판단`
      : live.stageDetail;
    const canDecide = live.stageState === 'decision' && !state.employees.stage;
    $('continueButton').disabled = !canDecide;
    $('finishButton').disabled = !canDecide;
    $('ticketCopy').textContent = state.employees.ticket ? `${JOBS.ticket.worker} 자동` : `대기 ${live.queue}`;
    $('lightCopy').textContent = state.employees.light ? `${JOBS.light.worker} 자동` : live.activeCue ? '지금!' : '신호 대기';
    $('ticketButton').classList.toggle('urgent', !state.employees.ticket && live.queue >= 2);
    $('lightButton').classList.toggle('urgent', !state.employees.light && Boolean(live.activeCue));
  }

  function finishShow() {
    if (state.phase !== 'live') return;
    if (live.stageState !== 'finished') {
      live.securedStage = live.trickBank;
      live.stageState = 'finished';
    }
    state.phase = 'result';
    const show = SHOWS[state.showKey];
    const ticketIncome = live.admitted * 2;
    const lightIncome = live.cueHits;
    const gross = ticketIncome + lightIncome + live.securedStage;
    const wages = Object.keys(state.employees).reduce((sum, key) => sum + JOBS[key].wage, 0);
    const net = gross - wages - show.cost;
    const cueTotal = Math.max(1, live.cueHits + live.cueMisses);
    const mood = Math.round(clamp(45 + (live.cueHits / cueTotal) * 28 + live.stageSuccesses * 6 - live.left * 5 - (live.stageFailed ? 12 : 0), 20, 98));
    const repGain = mood >= 82 ? 2 : mood >= 65 ? 1 : 0;
    state.money += net;
    state.reputation += repGain;
    result = { show, ticketIncome, lightIncome, gross, wages, net, mood, repGain };
    cancelAnimationFrame(animationId);
    $('showTimer').classList.remove('on');
    hideStations();
    hideBanner();
    renderResult();
    renderAll();
    drawScene(live.endAt);
    playSequence([520, 700, 900]);
    if (state.day >= MAX_DAYS) setTimeout(showFinal, 550);
    else showPanel('resultPanel');
  }

  function renderResult() {
    const ending = live.stageFailed ? '묘기 실수로 일찍 종료' : live.stageSuccesses >= result.show.maxTricks ? '모든 묘기 성공' : '수입을 지키며 마무리';
    $('resultTitle').textContent = `${result.show.name} · ${ending}`;
    $('resultAudience').textContent = `${live.admitted}/${live.arrived}`;
    $('resultMood').textContent = `${result.mood}%`;
    $('resultGross').textContent = `+${result.gross}`;
    $('resultNet').textContent = `${result.net >= 0 ? '+' : ''}${result.net}`;
    renderInvestments();
  }

  function renderInvestments() {
    const employeeOptions = Object.entries(JOBS).filter(([key]) => !state.employees[key]).map(([key, job]) => ({
      key: `hire:${key}`, title: `${job.worker} 고용`, detail: `${job.name} 자동 · ${job.bonus} · 임금 ${job.wage}`, cost: job.hire,
    }));
    const seatCost = 12 + state.seatLevel * 6;
    const options = [...employeeOptions, {
      key: 'seat', title: '객석 늘리기', detail: `모든 공연의 좌석 ${capacityForShow()} → ${capacityForShow() + 2}`, cost: seatCost,
    }];
    $('investments').innerHTML = options.map(option => `<button class="invest-card" data-invest="${option.key}" ${state.money < option.cost ? 'disabled' : ''}>
      <span><strong>${option.title}</strong><small>${option.detail}</small></span><span class="price">${option.cost}</span>
    </button>`).join('');
    document.querySelectorAll('[data-invest]').forEach(button => button.addEventListener('click', () => invest(button.dataset.invest)));
  }

  function invest(key) {
    if (state.phase !== 'result') return;
    const jobKey = key.startsWith('hire:') ? key.split(':')[1] : null;
    const cost = jobKey ? JOBS[jobKey].hire : 12 + state.seatLevel * 6;
    if (state.money < cost) return;
    state.money -= cost;
    if (jobKey) state.employees[jobKey] = { name: JOBS[jobKey].worker };
    else state.seatLevel++;
    playSequence(jobKey ? [320, 430, 560] : [180, 260, 360]);
    nextDay();
  }

  function nextDay() {
    if (state.day >= MAX_DAYS) return showFinal();
    state.day++;
    state.phase = 'plan';
    state.showKey = null;
    live = null;
    result = null;
    showPanel('planPanel');
    renderAll();
    drawScene(0);
  }

  function showFinal() {
    state.phase = 'end';
    showPanel('finalPanel');
    const names = Object.keys(state.employees).map(key => JOBS[key].worker);
    $('finalSummary').textContent = `${names.length ? names.join(' · ') : '직원 없이'} 운영 · 평판 ${state.reputation} · 보유금 ${state.money}`;
  }

  function drawScene(elapsed) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (state.phase === 'plan') drawCamp();
    else drawPerformance(elapsed);
  }

  function drawCamp() {
    drawNightSky();
    ctx.fillStyle = '#35483a'; ctx.fillRect(0, 260, 960, 270);
    ctx.fillStyle = '#8b6844'; ctx.beginPath(); ctx.ellipse(480, 420, 410, 92, 0, 0, Math.PI * 2); ctx.fill();
    drawWagon(45, 276);
    drawTent(505, 285, .88);
    drawSign(790, 355);
    Object.keys(state.employees).forEach((key, index) => drawPerson(245 + index * 55, 410, JOBS[key].color, 0));
  }

  function drawPerformance(elapsed) {
    const cueOn = live && live.activeCue;
    ctx.fillStyle = '#312324'; ctx.fillRect(0, 0, 960, 530);
    ctx.fillStyle = '#6f3439'; ctx.fillRect(0, 0, 118, 530); ctx.fillRect(842, 0, 118, 530);
    ctx.fillStyle = '#b9474e'; for (let x = 0; x < 960; x += 96) ctx.fillRect(x, 0, 48, 90);
    ctx.fillStyle = '#352620'; ctx.fillRect(0, 455, 960, 75);

    if (cueOn || state.employees.light) {
      ctx.save(); ctx.globalAlpha = cueOn ? .32 : .16; ctx.fillStyle = '#fff0a8';
      ctx.beginPath(); ctx.moveTo(245, 0); ctx.lineTo(345, 355); ctx.lineTo(520, 355); ctx.lineTo(355, 0); ctx.fill();
      ctx.beginPath(); ctx.moveTo(610, 0); ctx.lineTo(455, 355); ctx.lineTo(635, 355); ctx.lineTo(715, 0); ctx.fill(); ctx.restore();
    }
    [300, 480, 660].forEach((x, index) => {
      ctx.fillStyle = cueOn ? '#fff0a8' : '#6f675d'; ctx.beginPath(); ctx.arc(x, 44, 13, 0, Math.PI * 2); ctx.fill();
      if (cueOn) { ctx.save(); ctx.globalAlpha = .2; ctx.beginPath(); ctx.arc(x, 44, 31 + index * 2, 0, Math.PI * 2); ctx.fill(); ctx.restore(); }
    });

    ctx.fillStyle = '#5a3a2b'; ctx.fillRect(215, 327, 525, 44); ctx.fillStyle = '#7d4d34'; ctx.fillRect(230, 316, 495, 18);
    const activeTime = Math.max(0, elapsed);
    const jumping = live && live.stageState === 'performing';
    const jump = jumping ? Math.abs(Math.sin(activeTime / 220)) * 24 : 0;
    drawPerson(455 + Math.sin(activeTime / 170) * 4, 285 - jump, '#67aee5', activeTime);
    if (state.showKey === 'big') drawPerson(565 + Math.sin(activeTime / 210) * 4, 295 - jump * .55, '#66c47d', activeTime + 400);
    if (jumping) drawJuggling(455, 225 - jump, activeTime);
    if (live && live.stageFailed) drawFailureStars(500, 220, activeTime);

    drawSeats();
    drawAudience(activeTime);
    drawQueue();
    drawTicketBooth(805, 335);
    drawWorkers(activeTime);
    if (live && live.stageState === 'finished' && !live.stageFailed) drawConfetti(activeTime);
  }

  function drawNightSky() {
    ctx.fillStyle = '#252d46'; ctx.fillRect(0, 0, 960, 300);
    ctx.fillStyle = '#b9c5dc';
    for (let y = 20; y < 240; y += 31) for (let x = (y % 2) * 20; x < 960; x += 47) ctx.fillRect(x, y, 2, 2);
    ctx.fillStyle = '#f3d27a'; ctx.beginPath(); ctx.arc(828, 69, 31, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#252d46'; ctx.beginPath(); ctx.arc(842, 58, 28, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#171b2b';
    [[0,190,135,75],[118,215,112,50],[730,202,110,63],[825,178,135,87]].forEach(([x,y,w,h]) => {
      ctx.fillRect(x,y,w,h); ctx.beginPath(); ctx.moveTo(x-8,y); ctx.lineTo(x+w/2,y-42); ctx.lineTo(x+w+8,y); ctx.fill();
    });
  }

  function drawTent(cx, ground, scale) {
    ctx.save(); ctx.translate(cx, ground); ctx.scale(scale, scale);
    ctx.fillStyle = '#d95656'; ctx.fillRect(-245, 40, 490, 220);
    ctx.fillStyle = '#efd18d'; for (let x = -245; x < 245; x += 72) ctx.fillRect(x, 40, 34, 220);
    ctx.fillStyle = '#8c303b'; ctx.beginPath(); ctx.moveTo(-270, 50); ctx.lineTo(0, -128); ctx.lineTo(270, 50); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#f4c95d'; ctx.lineWidth = 6; ctx.stroke();
    ctx.fillStyle = '#171520'; ctx.fillRect(-90, 105, 180, 155);
    ctx.fillStyle = '#a43842'; ctx.beginPath(); ctx.moveTo(-100, 92); ctx.lineTo(-28, 155); ctx.lineTo(-100, 260); ctx.fill(); ctx.beginPath(); ctx.moveTo(100, 92); ctx.lineTo(28, 155); ctx.lineTo(100, 260); ctx.fill();
    ctx.fillStyle = '#f4c95d'; ctx.fillRect(-8, -171, 16, 46); ctx.fillStyle = '#d95656'; ctx.beginPath(); ctx.moveTo(8,-171); ctx.lineTo(65,-155); ctx.lineTo(8,-139); ctx.fill();
    ctx.restore();
  }

  function drawWagon(x, y) {
    ctx.fillStyle = '#315660'; ctx.fillRect(x, y, 155, 120); ctx.fillStyle = '#e7cf91'; ctx.fillRect(x, y, 155, 25);
    ctx.fillStyle = '#6e3c31'; ctx.fillRect(x+95, y+38, 42, 82); ctx.fillStyle = '#c99a4a'; ctx.fillRect(x+18,y+45,48,42);
    ctx.fillStyle = '#2f2725'; [x+35,x+123].forEach(wx => { ctx.beginPath(); ctx.arc(wx,y+126,23,0,Math.PI*2); ctx.fill(); ctx.strokeStyle='#a57b4d';ctx.lineWidth=5;ctx.stroke(); });
  }

  function drawSign(x, y) {
    ctx.fillStyle = '#49352b'; ctx.fillRect(x-48,y-60,96,105); ctx.fillRect(x-34,y+45,8,45); ctx.fillRect(x+26,y+45,8,45);
    ctx.fillStyle = '#efd18d'; ctx.fillRect(x-38,y-50,76,80); ctx.fillStyle='#d95656'; drawStar(x,y-10,21,9);
  }

  function drawTicketBooth(x, y) {
    ctx.fillStyle = '#49352b'; ctx.fillRect(x-54,y-52,108,116); ctx.fillStyle='#704535';ctx.fillRect(x-65,y-70,130,23);
    ctx.fillStyle = '#f0d28b'; ctx.fillRect(x-35,y-31,70,45); ctx.fillStyle='#d95656';ctx.fillRect(x-42,y+33,84,15);
  }

  function drawSeats() {
    const seats = seatPositions(capacityForShow());
    seats.forEach(seat => {
      ctx.fillStyle='#742f39';ctx.fillRect(seat.x-14,seat.y-2,28,18);ctx.fillStyle='#9e4850';ctx.fillRect(seat.x-12,seat.y,24,8);ctx.fillStyle='#33252b';ctx.fillRect(seat.x-11,seat.y+16,4,10);ctx.fillRect(seat.x+7,seat.y+16,4,10);
    });
  }

  function seatPositions(count) {
    const positions = [];
    const rows = count > 8 ? 3 : 2;
    const perRow = Math.ceil(count / rows);
    for (let i = 0; i < count; i++) {
      const row = Math.floor(i / perRow);
      const inRow = i % perRow;
      const rowCount = Math.min(perRow, count - row * perRow);
      const spacing = Math.min(78, 530 / Math.max(1, rowCount - 1));
      const startX = 455 - (rowCount - 1) * spacing / 2;
      positions.push({ x: startX + inRow * spacing, y: 382 + row * 45 });
    }
    return positions;
  }

  function drawAudience(elapsed) {
    if (!live) return;
    const seats = seatPositions(capacityForShow());
    for (let i = 0; i < live.admitted; i++) {
      const seat = seats[i];
      const cheer = live.cueHits > 0 || live.stageSuccesses > 0;
      const bob = cheer ? Math.abs(Math.sin(elapsed / 150 + i)) * 6 : 0;
      drawAudiencePerson(seat.x, seat.y - 22 - bob, COLORS[i % COLORS.length], cheer, i, elapsed);
    }
  }

  function drawQueue() {
    if (!live) return;
    for (let i = 0; i < live.queue; i++) drawAudiencePerson(870 + (i % 2) * 34, 360 + Math.floor(i / 2) * 45, COLORS[(i + 2) % COLORS.length], false, i, 0);
  }

  function drawAudiencePerson(x, y, color, cheering, index, elapsed) {
    ctx.save(); ctx.translate(x,y); ctx.fillStyle=color; ctx.fillRect(-10,9,20,24); ctx.fillStyle='#e8c29d'; ctx.beginPath(); ctx.arc(0,0,10,0,Math.PI*2); ctx.fill(); ctx.fillStyle='#392c30'; ctx.fillRect(-8,-7,16,5);
    if (cheering) { const wave=Math.sin(elapsed/100+index)*4; ctx.strokeStyle='#e8c29d';ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(-8,13);ctx.lineTo(-16,-3+wave);ctx.moveTo(8,13);ctx.lineTo(16,-3-wave);ctx.stroke(); }
    ctx.restore();
  }

  function drawPerson(x, y, color, time) {
    ctx.save(); ctx.translate(x,y); ctx.fillStyle='#1a1720';ctx.fillRect(-12,30,8,18);ctx.fillRect(5,30,8,18);ctx.fillStyle=color;ctx.fillRect(-18,-5,36,37);ctx.fillStyle='#efc7a2';ctx.beginPath();ctx.arc(0,-19,14,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#422f31';ctx.lineWidth=3;ctx.stroke();ctx.fillStyle=color;ctx.fillRect(-16,-35,32,8);ctx.fillStyle='#422f31';ctx.fillRect(-7,-20,3,3);ctx.fillRect(5,-20,3,3);ctx.restore();
  }

  function drawWorkers(elapsed) {
    if (state.employees.ticket) drawPerson(790 + Math.sin(elapsed/170)*3, 392, JOBS.ticket.color, elapsed);
    if (state.employees.light) drawPerson(170 + Math.sin(elapsed/190)*3, 145, JOBS.light.color, elapsed);
    if (state.employees.stage) drawPerson(690 + Math.sin(elapsed/200)*3, 292, JOBS.stage.color, elapsed);
  }

  function drawJuggling(x, y, elapsed) {
    for (let i=0;i<3;i++) { const angle=elapsed/320+i*Math.PI*2/3;ctx.fillStyle=COLORS[i];ctx.beginPath();ctx.arc(x+Math.cos(angle)*38,y+Math.sin(angle)*18,7,0,Math.PI*2);ctx.fill(); }
  }

  function drawFailureStars(x, y, elapsed) {
    ctx.fillStyle='#f4c95d'; for(let i=0;i<3;i++){const a=elapsed/330+i*Math.PI*2/3;drawStar(x+Math.cos(a)*45,y+Math.sin(a)*18,8,3);}
  }

  function drawConfetti(elapsed) {
    const t=(elapsed%1200)/1200; for(let i=0;i<24;i++){ctx.fillStyle=COLORS[i%COLORS.length];ctx.fillRect(300+(i*53%390),145+((i*31)%130)+t*90,7,7);}
  }

  function drawStar(x,y,outer,inner) {
    ctx.beginPath(); for(let i=0;i<10;i++){const radius=i%2===0?outer:inner;const angle=-Math.PI/2+i*Math.PI/5;const px=x+Math.cos(angle)*radius;const py=y+Math.sin(angle)*radius;if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);} ctx.closePath();ctx.fill();
  }

  function setBanner(text) {
    const banner = $('phaseBanner');
    banner.textContent = text;
    banner.classList.add('on');
    clearTimeout(bannerTimer);
    bannerTimer = setTimeout(hideBanner, 1150);
  }

  function hideBanner() { $('phaseBanner').classList.remove('on'); }
  function ensureAudio(){if(!soundOn)return;if(!audioContext)audioContext=new(window.AudioContext||window.webkitAudioContext)();if(audioContext.state==='suspended')audioContext.resume();}
  function playTone(freq,duration,type='square',volume=.03){if(!soundOn)return;ensureAudio();const osc=audioContext.createOscillator();const gain=audioContext.createGain();osc.type=type;osc.frequency.value=freq;gain.gain.setValueAtTime(volume,audioContext.currentTime);gain.gain.exponentialRampToValueAtTime(.0001,audioContext.currentTime+duration);osc.connect(gain);gain.connect(audioContext.destination);osc.start();osc.stop(audioContext.currentTime+duration);}
  function playSequence(notes){notes.forEach((freq,index)=>setTimeout(()=>playTone(freq,.1,'square',.035),index*80));}

  $('ticketButton').addEventListener('click', () => admitAudience(false));
  $('lightButton').addEventListener('click', () => hitLight(false));
  $('continueButton').addEventListener('click', () => continueTrick(false));
  $('finishButton').addEventListener('click', () => finishStage(false));
  $('skipInvest').addEventListener('click', nextDay);
  $('restartButton').addEventListener('click', resetGame);
  $('soundButton').addEventListener('click', () => { soundOn = !soundOn; $('soundButton').classList.toggle('muted', !soundOn); if (soundOn) playTone(440,.08,'square',.04); });

  resetGame();
})();
</script>
</body>
</html>
