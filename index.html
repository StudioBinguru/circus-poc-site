<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PoC | 오늘 밤의 공연</title>
<style>
  :root {
    --bg: #1a1625; --panel: #241e33; --panel2: #2d2542;
    --text: #e8e2f4; --dim: #9a8fb8;
    --safe: #4caf7d; --wobble: #e0a93e; --danger: #e05a5a;
    --accent: #8a6ff0; --gold: #f0c96f;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; padding: 20px; }
  .wrap { max-width: 860px; margin: 0 auto; }
  .masthead { border-bottom: 1px solid #3a3153; padding: 6px 2px 16px; margin-bottom: 14px; }
  .brand { color: var(--gold); font-size: 11px; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; }
  h1 { font-size: 22px; margin-bottom: 6px; }
  .sub { color: var(--dim); font-size: 13px; line-height: 1.5; }

  .topbar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 14px; }
  .topbar button.scn { background: var(--panel); color: var(--dim); border: 1px solid #3a3153; border-radius: 8px; padding: 6px 12px; cursor: pointer; font-size: 13px; }
  .topbar button.scn.on { color: var(--text); border-color: var(--accent); background: var(--panel2); }

  .status { display: flex; gap: 18px; background: var(--panel); border-radius: 8px; padding: 10px 16px; margin-bottom: 16px; font-size: 14px; align-items: center; }
  .status .big { font-size: 22px; font-weight: 700; color: var(--gold); min-width: 60px; }
  .status .lbl { color: var(--dim); font-size: 11px; display: block; }
  .status .goal { margin-left: auto; text-align: right; font-size: 12px; color: var(--dim); }

  .stage { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 14px; }
  .zone { background: var(--panel); border: 2px solid #3a3153; border-radius: 8px; padding: 12px 10px; text-align: center; cursor: pointer; position: relative; transition: border-color .15s, transform .1s; user-select: none; }
  .zone:hover { transform: translateY(-2px); }
  .zone.flipped { border-color: var(--accent); box-shadow: 0 0 14px #8a6ff055; }
  .zone.locked { cursor: not-allowed; opacity: .65; }
  .zone.revealing { cursor: default; }

  .stage-name { color: var(--text); font-size: 12px; font-weight: 700; margin-bottom: 10px; }
  .cap { font-size: 10px; color: var(--dim); margin-bottom: 3px; }
  .crowd { height: 20px; display: flex; justify-content: center; gap: 6px; align-items: center; margin-bottom: 8px; }
  .crowd .p { width: 13px; height: 13px; border-radius: 50%; background: #3a3153; position: relative; }
  .crowd .p::after { content: ''; position: absolute; left: 2px; top: 12px; width: 9px; height: 5px; border-radius: 4px 4px 0 0; background: inherit; }
  .crowd .p.hot { background: var(--gold); }

  .performer { width: 64px; height: 64px; margin: 6px auto 10px; display: flex; align-items: center; justify-content: center; }
  .shape { width: 46px; height: 46px; }
  .shape.circle { border-radius: 50%; background: #5aa2e0; }
  .shape.triangle { width: 0; height: 0; background: none; border-left: 26px solid transparent; border-right: 26px solid transparent; border-bottom: 46px solid #e0755a; }
  .shape.square { background: #6fc98a; border-radius: 6px; }

  .t0 .performer { animation: none; }
  .t1 .performer { animation: wob 1.1s ease-in-out infinite; }
  .t2 .performer { animation: shake .28s linear infinite; }
  @keyframes wob { 0%,100% { transform: rotate(-4deg); } 50% { transform: rotate(4deg); } }
  @keyframes shake { 0% { transform: translate(-3px,1px) rotate(-5deg); } 50% { transform: translate(3px,-1px) rotate(5deg); } 100% { transform: translate(-3px,1px) rotate(-5deg); } }

  .risk-label { color: var(--dim); font-size: 10px; margin-bottom: 3px; }
  .meterrow { display: flex; align-items: center; gap: 6px; justify-content: center; margin-bottom: 9px; }
  .meter { width: 74px; height: 10px; border-radius: 5px; background: #3a3153; overflow: hidden; border: 1px solid #4a4066; }
  .meter .fill { height: 100%; border-radius: 5px; transition: width .3s, background .3s; }
  .zone.t0 .meter .fill { width: 18%; background: var(--safe); }
  .zone.t1 .meter .fill { width: 58%; background: var(--wobble); }
  .zone.t2 .meter .fill { width: 100%; background: var(--danger); }
  .tierword { font-size: 11px; min-width: 34px; text-align: left; }
  .zone.t0 .tierword { color: var(--safe); } .zone.t0 .tierword::after { content: '낮음'; }
  .zone.t1 .tierword { color: var(--wobble); } .zone.t1 .tierword::after { content: '주의'; }
  .zone.t2 .tierword { color: var(--danger); } .zone.t2 .tierword::after { content: '높음'; }

  .crewname { font-size: 13px; color: var(--text); font-weight: 700; margin-bottom: 2px; }
  .habit { color: var(--dim); font-size: 10px; min-height: 15px; margin-bottom: 7px; }
  .preview { font-size: 14px; font-weight: 700; padding: 7px 4px 6px; border-radius: 6px; background: var(--panel2); }
  .preview.push { color: var(--gold); }
  .preview.settle { color: var(--safe); }
  .preview .arrow { font-size: 15px; }
  .effect { display: block; color: var(--dim); font-size: 10px; font-weight: 500; margin-top: 2px; }
  .flipnote { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #fff; font-size: 10px; padding: 2px 8px; border-radius: 8px; display: none; }
  .zone.flipped .flipnote { display: block; }
  .locknote { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: #555; color: #ddd; font-size: 10px; padding: 2px 8px; border-radius: 8px; }

  .coin { height: 30px; margin-top: 8px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; visibility: hidden; }
  .coin.spin { visibility: visible; }
  .coin .face { padding: 3px 10px; border-radius: 6px; background: #3a3153; }
  .result-pop { position: absolute; left: 50%; top: 34%; transform: translateX(-50%); font-size: 20px; font-weight: 800; opacity: 0; pointer-events: none; }
  .result-pop.show { animation: popup 1.1s ease-out forwards; }
  @keyframes popup { 0% { opacity: 0; transform: translateX(-50%) translateY(8px) scale(.7); } 25% { opacity: 1; transform: translateX(-50%) translateY(-6px) scale(1.15); } 80% { opacity: 1; } 100% { opacity: 0; transform: translateX(-50%) translateY(-22px) scale(1); } }
  .flash-good { animation: fgood .7s; } @keyframes fgood { 30% { background: #2e4636; } }
  .flash-bad { animation: fbad .7s; } @keyframes fbad { 30% { background: #4d2830; } }

  .controls { display: flex; gap: 10px; margin-bottom: 14px; }
  .controls button { flex: 1; padding: 12px; font-size: 15px; font-weight: 700; border: none; border-radius: 10px; cursor: pointer; }
  #goBtn { background: var(--accent); color: #fff; }
  #goBtn:disabled { background: #494073; color: #aaa; cursor: not-allowed; }
  .hint { text-align: center; color: var(--dim); font-size: 12px; margin-bottom: 14px; }

  .endpanel { background: var(--panel); border-radius: 14px; padding: 20px; text-align: center; display: none; margin-bottom: 14px; }
  .endpanel h2 { font-size: 24px; margin-bottom: 8px; }
  .endpanel .grade-high { color: var(--gold); } .endpanel .grade-basic { color: var(--safe); } .endpanel .grade-fail { color: var(--danger); }
  .endpanel .btns { display: flex; gap: 10px; justify-content: center; margin: 14px 0; }
  .endpanel .btns button { padding: 10px 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; background: var(--accent); color: #fff; }
  .checklist { text-align: left; max-width: 520px; margin: 0 auto; font-size: 13px; color: var(--dim); }
  .checklist label { display: block; padding: 4px 0; cursor: pointer; }
  .checklist input { margin-right: 8px; }

  details { background: var(--panel); border-radius: 10px; padding: 10px 14px; font-size: 12px; color: var(--dim); }
  details button { margin-top: 8px; padding: 6px 12px; border: none; border-radius: 6px; background: var(--panel2); color: var(--text); cursor: pointer; }
  #logview { white-space: pre-wrap; max-height: 220px; overflow-y: auto; margin-top: 8px; font-family: Consolas, monospace; font-size: 11px; }

  @media (max-width: 680px) {
    body { padding: 12px; }
    .stage { grid-template-columns: 1fr; }
    .zone { display: grid; grid-template-columns: 70px 1fr; column-gap: 12px; align-items: center; text-align: left; }
    .stage-name, .cap, .crowd, .risk-label, .meterrow, .crewname, .habit, .preview, .coin { grid-column: 2; }
    .performer { grid-column: 1; grid-row: 1 / span 8; }
    .crowd, .meterrow { justify-content: flex-start; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="masthead">
    <div class="brand">PoC</div>
    <h1>오늘 밤의 공연</h1>
    <div class="sub">세 단원이 각자 공연 계획을 세웠다. 공연이 시작되기 전, 한 명의 계획만 바꿀 수 있다.</div>
  </header>

  <div class="topbar" id="scnBar"></div>

  <div class="status">
    <div><span class="lbl">관객 환호</span><span class="big" id="score">0</span></div>
    <div><span class="lbl">공연 진행</span><span id="round" style="font-size:18px;font-weight:700">1 / 4</span></div>
    <div class="goal" id="goal"></div>
  </div>

  <div class="stage" id="stage"></div>

  <div class="controls">
    <button id="goBtn">이 계획으로 공연 시작</button>
  </div>
  <div class="hint" id="hint">단원을 누르면 계획 변경 · 다시 누르면 취소</div>

  <div class="endpanel" id="endpanel"></div>

  <details>
    <summary>플레이 기록 (JSON)</summary>
    <button id="copyBtn">기록 복사</button>
    <div id="logview"></div>
  </details>
</div>

<script>
// ===== 합의된 규칙 (2026-07-14 클로드·코덱스 토론 결과) =====
// 기대 E ∈ {1,2,3}. 대성공 +2E / 아슬아슬 성공 +E / 사고 -2 + 다음 판단 안전 점검 고정
// 묘기 도전: 결과와 무관하게 사고 위험 +1 / 안전 점검: 환호 0, 사고 위험 -1
// 위험 낮음에서 도전: 대성공 확정 / 주의: 대성공·아슬아슬 성공 / 높음: 아슬아슬 성공·사고
// 단원: 신중형=주의부터 점검 / 흥행형=기대 2 이상이면 도전 / 고집형=직전 계획 유지

const SCENARIOS = [
  { name: '첫째 밤', E: [[1,3,2],[3,3,1],[2,2,3],[1,3,2]], tiers: [0,1,0], c: 'push',   basic: 16, high: 28 },
  { name: '둘째 밤', E: [[2,1,1],[1,1,3],[3,2,1],[2,3,2]], tiers: [0,2,1], c: 'push',   basic: 22, high: 28 },
  { name: '셋째 밤', E: [[1,2,1],[2,1,2],[1,2,3],[3,1,3]], tiers: [0,0,0], c: 'settle', basic: 16, high: 29 },
];
const CREW = [
  { label: '신중한 단원', habit: '위험해지면 안전부터 확인', shape: 'circle' },
  { label: '흥행을 좇는 단원', habit: '관객 기대가 크면 묘기에 도전', shape: 'triangle' },
  { label: '고집 센 단원', habit: '지난 계획을 계속 반복', shape: 'square' },
];
const STAGES = ['왼쪽 무대', '중앙 무대', '오른쪽 무대'];
const TURNS = 4;

let S = null; // 게임 상태

function newGame(sIdx, retry) {
  const sc = SCENARIOS[sIdx];
  S = {
    sIdx, sc, round: 0, score: 0,
    tiers: [...sc.tiers], forced: [false, false, false], cAct: sc.c,
    flip: null, phase: 'choose',
    log: { scenario: sc.name, retry: retry || 0, rounds: [], checklist: null },
  };
  document.getElementById('endpanel').style.display = 'none';
  renderTop(); renderStage(); renderLog();
}

function preview(z) {
  if (S.forced[z]) return 'settle';
  const tier = S.tiers[z], E = S.sc.E[S.round][z];
  if (z === 0) return tier >= 1 ? 'settle' : 'push';
  if (z === 1) return E >= 2 ? 'push' : 'settle';
  return S.cAct;
}
function actionOf(z) {
  const p = preview(z);
  return S.flip === z ? (p === 'push' ? 'settle' : 'push') : p;
}

// ===== 렌더 =====
function renderTop() {
  const bar = document.getElementById('scnBar');
  bar.innerHTML = SCENARIOS.map((sc, i) =>
    `<button class="scn ${i === S.sIdx ? 'on' : ''}" onclick="newGame(${i}, 0)">${sc.name}</button>`).join('');
  document.getElementById('score').textContent = S.score;
  document.getElementById('round').textContent = `${Math.min(S.round + 1, TURNS)} / ${TURNS}`;
  document.getElementById('goal').innerHTML = `공연 성공 ${S.sc.basic}<br>대성공 ${S.sc.high}`;
}

function renderStage() {
  const stage = document.getElementById('stage');
  stage.innerHTML = [0, 1, 2].map(z => {
    const E = S.sc.E[S.round][z], tier = S.tiers[z], act = actionOf(z);
    const crowd = [1, 2, 3].map(i => `<div class="p ${i <= E ? 'hot' : ''}"></div>`).join('');
    const pv = act === 'push'
      ? `<div class="preview push"><span class="arrow">▲</span> 고난도 묘기 도전<span class="effect">관객 환호 상승 · 사고 위험 상승</span></div>`
      : `<div class="preview settle"><span class="arrow">▼</span> 안전 점검<span class="effect">사고 위험 감소 · 관객 환호 없음</span></div>`;
    return `
    <div class="zone t${tier} ${S.flip === z ? 'flipped' : ''} ${S.forced[z] ? 'locked' : ''}" id="zone${z}" onclick="tapZone(${z})">
      ${S.forced[z] ? '<div class="locknote">사고 수습 중 · 안전 점검 고정</div>' : '<div class="flipnote">계획 변경</div>'}
      <div class="stage-name">${STAGES[z]}</div>
      <div class="cap">관객 기대</div>
      <div class="crowd">${crowd}</div>
      <div class="performer"><div class="shape ${CREW[z].shape}"></div></div>
      <div class="risk-label">사고 위험</div>
      <div class="meterrow"><div class="meter"><div class="fill"></div></div><div class="tierword"></div></div>
      <div class="crewname">${CREW[z].label}</div>
      <div class="habit">${CREW[z].habit}</div>
      ${pv}
      <div class="coin" id="coin${z}"><span class="face"></span></div>
      <div class="result-pop" id="pop${z}"></div>
    </div>`;
  }).join('');
  document.getElementById('goBtn').disabled = S.phase !== 'choose';
  document.getElementById('goBtn').textContent = S.flip === null ? '이 계획으로 공연 시작' : '바꾼 계획으로 공연 시작';
}

function tapZone(z) {
  if (S.phase !== 'choose' || S.forced[z]) return;
  S.flip = S.flip === z ? null : z;
  renderStage();
}

// ===== 진행 =====
const wait = ms => new Promise(r => setTimeout(r, ms));

document.getElementById('goBtn').onclick = async () => {
  if (S.phase !== 'choose') return;
  S.phase = 'reveal';
  renderStage();

  const entry = {
    round: S.round + 1,
    E: S.sc.E[S.round].slice(),
    tiersBefore: S.tiers.slice(),
    forcedBefore: S.forced.slice(),
    previews: [0, 1, 2].map(preview),
    flip: S.flip,
    results: [],
  };

  // 관성형 지속 규칙: 뒤집었으면 그 행동이 새 관성
  const acts = [0, 1, 2].map(actionOf);
  if (S.flip === 2) S.cAct = acts[2];

  // 2단계 공개: 확정 결과 동시 -> 도박(흔들림·위험 밀기) 동시. 전체 2초 이내
  const newForced = [false, false, false];
  const outs = [null, null, null];
  const certain = [], gambles = [];
  for (const z of [0, 1, 2]) (acts[z] === 'push' && S.tiers[z] >= 1 ? gambles : certain).push(z);

  for (const z of certain) outs[z] = rollOutcome(acts[z], entry.E[z], S.tiers[z]);
  await Promise.all(certain.map(z => applyVisual(z, outs[z])));
  for (const z of certain) { S.score += outs[z].gain; S.tiers[z] = outs[z].newTier; }
  document.getElementById('score').textContent = S.score;

  if (gambles.length) {
    await wait(200);
    for (const z of gambles) outs[z] = rollOutcome(acts[z], entry.E[z], S.tiers[z]);
    await Promise.all(gambles.map(z => spinCoin(z, outs[z])));
    await Promise.all(gambles.map(z => applyVisual(z, outs[z])));
    for (const z of gambles) {
      S.score += outs[z].gain; S.tiers[z] = outs[z].newTier;
      if (outs[z].forced) newForced[z] = true;
    }
    document.getElementById('score').textContent = S.score;
  }
  entry.results = outs.map(o => o.kind);
  await wait(250);

  S.forced = newForced;
  entry.scoreAfter = S.score;
  S.log.rounds.push(entry);
  S.round++;
  S.flip = null;

  if (S.round >= TURNS) return endGame();
  S.phase = 'choose';
  renderTop(); renderStage(); renderLog();
};

function rollOutcome(act, E, tier) {
  if (act === 'settle')
    return { kind: '안전 점검', gain: 0, forced: false, newTier: Math.max(0, tier - 1), faces: null };
  const newTier = Math.min(2, tier + 1);
  if (tier === 0)
    return { kind: '대성공', gain: 2 * E, forced: false, newTier, faces: null };
  const faces = tier === 1
    ? [{ k: '대성공', g: 2 * E }, { k: '아슬아슬 성공', g: E }]
    : [{ k: '아슬아슬 성공', g: E }, { k: '사고 발생', g: -2 }];
  const hit = faces[Math.random() < 0.5 ? 0 : 1];
  return { kind: hit.k, gain: hit.g, forced: hit.k === '사고 발생', newTier, faces, hit };
}

function applyVisual(z, out) {
  const zone = document.getElementById('zone' + z);
  zone.className = zone.className.replace(/t[0-2]/, 't' + out.newTier);
  if (out.kind === '안전 점검') return pop(z, '안전 확보', 'var(--safe)');
  if (out.kind === '사고 발생') return pop(z, '사고 -2', 'var(--danger)', 'flash-bad');
  return pop(z, '+' + out.gain, out.kind === '대성공' ? 'var(--gold)' : 'var(--text)', 'flash-good');
}

async function spinCoin(z, out) {
  const coin = document.getElementById('coin' + z);
  const face = coin.querySelector('.face');
  coin.classList.add('spin');
  for (let i = 0; i < 5; i++) {
    const f = out.faces[i % 2];
    face.textContent = f.k;
    face.style.color = f.g < 0 ? 'var(--danger)' : 'var(--gold)';
    await wait(80);
  }
  face.textContent = out.hit.k;
  face.style.color = out.hit.g < 0 ? 'var(--danger)' : 'var(--gold)';
  await wait(220);
  coin.classList.remove('spin');
}

async function pop(z, text, color, flash) {
  const el = document.getElementById('pop' + z);
  el.textContent = text; el.style.color = color;
  el.classList.remove('show'); void el.offsetWidth; el.classList.add('show');
  if (flash) {
    const zone = document.getElementById('zone' + z);
    zone.classList.remove('flash-good', 'flash-bad'); void zone.offsetWidth;
    zone.classList.add(flash);
  }
  await wait(500);
}

// ===== 종료 =====
const CHECKS = [
  '공연 성공이 가능한데도 대성공을 노려 위험을 감수했다',
  '결과가 나오는 순간 기대나 불안이 생겼다',
  '"맡겨도 된다" 또는 "말려야 한다"는 감정이 생긴 단원이 있었다',
  '실패 후 포기하지 않고 복구 방법을 찾았다',
  '같은 공연을 다른 계획으로 다시 해보고 싶다',
];

function endGame() {
  S.phase = 'end';
  const sc = S.sc;
  const grade = S.score >= sc.high ? ['대성공!', 'grade-high']
    : S.score >= sc.basic ? ['공연 성공', 'grade-basic'] : ['공연 실패', 'grade-fail'];
  S.log.finalScore = S.score;
  S.log.grade = grade[0];

  const ep = document.getElementById('endpanel');
  ep.style.display = 'block';
  ep.innerHTML = `
    <h2 class="${grade[1]}">${grade[0]}</h2>
    <div>최종 관객 환호 <b style="font-size:20px">${S.score}</b> (성공 ${sc.basic} / 대성공 ${sc.high})</div>
    <div class="btns">
      <button onclick="newGame(${S.sIdx}, ${S.log.retry + 1})">같은 판 다시 (${S.log.retry + 1}번째 재도전)</button>
    </div>
    <div class="checklist">
      <b>재미 판정 (해당하면 체크)</b>
      ${CHECKS.map((c, i) => `<label><input type="checkbox" onchange="setCheck(${i}, this.checked)">${c}</label>`).join('')}
    </div>`;
  S.log.checklist = CHECKS.map(() => false);
  renderTop(); renderLog();
}

function setCheck(i, v) { S.log.checklist[i] = v; renderLog(); }

// ===== 기록 =====
const HISTORY = [];
function renderLog() {
  if (S.phase === 'end' && !HISTORY.includes(S.log)) HISTORY.push(S.log);
  document.getElementById('logview').textContent = JSON.stringify(HISTORY.length ? HISTORY : [S.log], null, 1);
}
document.getElementById('copyBtn').onclick = () => {
  navigator.clipboard.writeText(JSON.stringify(HISTORY.length ? HISTORY : [S.log], null, 2));
};

newGame(0, 0);
</script>
</body>
</html>
