<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PoC | 작은 서커스</title>
<style>
  :root {
    --ink: #f7efd8;
    --muted: #b9af9d;
    --night: #17192c;
    --panel: #24283b;
    --panel-2: #30364c;
    --line: #4d5368;
    --red: #d95555;
    --red-dark: #8e303a;
    --gold: #f4c95d;
    --green: #63c17b;
    --blue: #65a8df;
    --shadow: #0b0d18;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; min-height: 100%; background: #101321; }
  body {
    color: var(--ink);
    font-family: "Malgun Gothic", "Segoe UI", sans-serif;
    padding: 14px;
    background: linear-gradient(#171a2a 0 62%, #101321 62% 100%);
  }
  button { font: inherit; }
  button:focus-visible { outline: 3px solid #fff1a6; outline-offset: 3px; }

  .game-shell {
    width: min(940px, 100%);
    margin: 0 auto;
    border: 3px solid #060814;
    background: var(--night);
    box-shadow: 0 12px 0 #080a13, 0 18px 40px #0008;
  }
  .marquee {
    min-height: 68px;
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    background: #20243a;
    border-bottom: 3px solid #090b16;
    position: relative;
  }
  .marquee::after {
    content: "";
    position: absolute;
    left: 0; right: 0; bottom: -3px;
    height: 3px;
    background: repeating-linear-gradient(90deg, var(--gold) 0 14px, var(--red) 14px 28px);
  }
  .brand-row { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .brand { color: var(--gold); font: 800 13px/1 Consolas, monospace; border: 2px solid var(--gold); padding: 5px 6px; }
  h1 { margin: 0; font-size: 20px; letter-spacing: 0; white-space: nowrap; }
  .town { color: var(--muted); font-size: 11px; margin-top: 3px; }
  .hud { display: flex; align-items: center; gap: 7px; }
  .hud-item {
    min-width: 74px;
    display: grid;
    grid-template-columns: 20px auto;
    grid-template-rows: 12px 20px;
    column-gap: 6px;
    align-items: center;
    padding: 5px 7px;
    background: #151828;
    border: 2px solid #3b4055;
  }
  .hud-icon { grid-row: 1 / span 2; width: 19px; height: 19px; position: relative; }
  .coin-icon { border-radius: 50%; background: var(--gold); border: 3px solid #a36d20; box-shadow: inset 0 0 0 2px #ffe79b; }
  .day-icon { border: 3px solid var(--blue); border-radius: 50%; }
  .day-icon::after { content: ""; position: absolute; left: 6px; top: 1px; width: 3px; height: 7px; background: var(--blue); transform-origin: bottom; transform: rotate(28deg); }
  .time-icon { border: 3px solid var(--gold); border-radius: 50%; box-shadow: 0 0 8px #f4c95d66; }
  .time-icon::before { content: ""; position: absolute; left: 6px; top: -6px; width: 3px; height: 5px; background: var(--gold); }
  .hud-label { color: var(--muted); font-size: 9px; line-height: 12px; }
  .hud-value { font: 800 17px/20px Consolas, monospace; color: var(--ink); }
  .sound-btn { width: 34px; height: 34px; padding: 0; border: 2px solid #4a5067; background: #151828; cursor: pointer; position: relative; }
  .speaker { position: absolute; left: 8px; top: 11px; width: 8px; height: 10px; background: var(--ink); }
  .speaker::before { content: ""; position: absolute; left: 6px; top: -4px; border-top: 9px solid transparent; border-bottom: 9px solid transparent; border-left: 9px solid var(--ink); }
  .speaker::after { content: ""; position: absolute; left: 15px; top: 0; width: 7px; height: 7px; border: 2px solid var(--gold); border-left: 0; border-bottom: 0; transform: rotate(45deg); }
  .sound-btn.muted::after { content: ""; position: absolute; left: 7px; top: 15px; width: 22px; height: 3px; background: var(--red); transform: rotate(-45deg); }

  .scene-frame { position: relative; background: #0a0c16; border-bottom: 3px solid #090b16; overflow: hidden; }
  canvas { width: 100%; height: auto; aspect-ratio: 96 / 53; display: block; image-rendering: pixelated; }
  .phase-banner {
    position: absolute;
    left: 50%; top: 16px;
    transform: translate(-50%, -12px);
    opacity: 0;
    min-width: 180px;
    padding: 7px 14px;
    text-align: center;
    font-weight: 900;
    font-size: 14px;
    color: #1a1720;
    background: var(--gold);
    border: 3px solid #fff0a8;
    box-shadow: 0 4px 0 #7c4e17;
    pointer-events: none;
    transition: opacity .15s, transform .15s;
    z-index: 8;
  }
  .phase-banner.on { opacity: 1; transform: translate(-50%, 0); }
  .show-timer { position: absolute; left: 18px; top: 16px; width: 150px; height: 12px; border: 2px solid #f4e9cf; background: #171a2a; display: none; z-index: 8; }
  .show-timer.on { display: block; }
  .show-timer-fill { height: 100%; width: 0; background: var(--gold); }

  .job-layer { position: absolute; inset: 0; z-index: 4; pointer-events: none; }
  .job-button {
    position: absolute;
    width: 78px; height: 78px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    border: 3px solid #f4e9cf;
    background: #171a2ee8;
    color: var(--ink);
    box-shadow: 0 5px 0 #080b14, 0 0 0 4px #0005;
    cursor: pointer;
    pointer-events: auto;
    transition: transform .12s, border-color .12s, opacity .12s;
  }
  .job-button:hover:not(:disabled) { transform: translate(-50%, -54%); border-color: var(--gold); }
  .job-button:active:not(:disabled) { transform: translate(-50%, -47%); }
  .job-button:disabled { cursor: default; }
  .job-button.prepared { background: #173127e8; border-color: var(--green); }
  .job-button.staffed { box-shadow: 0 5px 0 #080b14, 0 0 0 4px #63c17b55; }
  .job-button.locked { opacity: .38; }
  .job-name { position: absolute; left: 50%; bottom: -22px; transform: translateX(-50%); white-space: nowrap; padding: 2px 7px; color: var(--ink); background: #111523e8; border: 1px solid #596179; font-size: 10px; font-weight: 900; }
  .job-check { position: absolute; right: -5px; top: -5px; width: 25px; height: 25px; display: grid; place-items: center; border-radius: 50%; color: #102019; background: var(--green); border: 2px solid #b9f2c4; font-weight: 900; }
  .job-staff { position: absolute; left: -8px; top: -8px; width: 28px; height: 28px; display: grid; place-items: center; border-radius: 50%; color: #201a17; background: #efc7a2; border: 2px solid #4a3030; font-size: 9px; font-weight: 900; }
  .job-art { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 42px; height: 42px; }
  .art-promo { background: var(--red); border: 3px solid #f0d28b; }
  .art-promo::after { content: "★"; display: grid; place-items: center; height: 100%; color: var(--gold); font-size: 24px; }
  .art-light { border-radius: 50%; background: var(--gold); border: 4px solid #fff0a8; box-shadow: 0 0 14px #f4c95d; }
  .art-light::after { content: ""; position: absolute; width: 20px; height: 8px; left: 7px; bottom: -8px; background: #6e5630; border: 3px solid #2e2725; }
  .art-stage { border: 4px solid var(--blue); border-radius: 50%; }
  .art-stage::before, .art-stage::after { content: ""; position: absolute; width: 9px; height: 9px; border-radius: 50%; background: var(--gold); top: 12px; }
  .art-stage::before { left: -6px; }
  .art-stage::after { right: -6px; }
  .art-ticket { width: 45px; height: 25px; background: #f0d28b; border: 3px solid #7e5634; transform: translate(-50%, -50%) rotate(-7deg); }
  .art-ticket::after { content: ""; position: absolute; inset: 4px 17px; border-left: 2px dashed #a36d20; }

  .work-point {
    position: absolute;
    width: 52px; height: 52px;
    transform: translate(-50%, -50%);
    border: 3px solid white;
    background: var(--gold);
    box-shadow: 0 0 0 5px #0006, 0 0 18px #f4c95dcc;
    cursor: pointer;
    pointer-events: auto;
    animation: workPulse .75s steps(2, end) infinite;
  }
  .work-point::after { content: "+"; display: grid; place-items: center; height: 100%; color: #32230f; font: 900 30px/1 Consolas, monospace; }
  .work-point.done { animation: none; transform: translate(-50%, -50%) scale(.1); opacity: 0; transition: .2s; }
  @keyframes workPulse { 50% { transform: translate(-50%, -50%) scale(1.12); } }

  .control-area { padding: 10px; background: #1c2032; min-height: 160px; }
  .prep-panel { display: grid; grid-template-columns: 1fr 210px; gap: 10px; }
  .staff-block { min-width: 0; background: var(--panel); border: 2px solid var(--line); padding: 9px; }
  .block-title { color: var(--muted); font-size: 10px; font-weight: 900; margin-bottom: 7px; }
  .staff-list { display: flex; gap: 7px; min-height: 76px; overflow-x: auto; align-items: stretch; }
  .staff-empty { display: flex; align-items: center; color: #777f95; font-size: 11px; }
  .staff-card { min-width: 132px; display: grid; grid-template-columns: 40px 1fr; gap: 7px; align-items: center; padding: 7px; background: #171a2a; border: 2px solid #454b61; }
  .staff-face { width: 38px; height: 44px; position: relative; background: var(--staff-color); border: 3px solid #111522; }
  .staff-face::before { content: ""; position: absolute; left: 7px; top: 5px; width: 19px; height: 19px; border-radius: 50%; background: #efc7a2; border: 2px solid #422f31; }
  .staff-face::after { content: ""; position: absolute; left: 5px; bottom: 3px; width: 23px; height: 12px; background: #efc7a2; border: 2px solid #422f31; border-bottom: 0; }
  .staff-copy strong { display: block; font-size: 12px; }
  .staff-copy span { display: block; margin-top: 3px; color: var(--muted); font-size: 9px; line-height: 1.35; }
  .start-wrap { display: grid; grid-template-rows: 1fr auto; gap: 8px; }
  .show-button { min-height: 82px; color: white; background: var(--red); border: 3px solid #ff8a74; box-shadow: inset 0 -8px 0 var(--red-dark), 0 5px 0 #080b14; font-size: 18px; font-weight: 900; cursor: pointer; text-shadow: 0 2px 0 #7e2631; }
  .show-button:hover:not(:disabled) { filter: brightness(1.1); }
  .show-button:active:not(:disabled) { transform: translateY(4px); box-shadow: inset 0 -4px 0 var(--red-dark), 0 1px 0 #080b14; }
  .show-button:disabled { filter: grayscale(.8); opacity: .45; cursor: default; }
  .prep-note { min-height: 24px; color: var(--muted); font-size: 10px; text-align: center; }

  .result-panel, .final-panel { display: none; }
  .result-panel.on, .final-panel.on { display: block; }
  .result-head { display: grid; grid-template-columns: repeat(4, 1fr); gap: 7px; margin-bottom: 9px; }
  .result-stat { background: var(--panel); border: 2px solid var(--line); padding: 8px 10px; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .result-stat span { color: var(--muted); font-size: 9px; }
  .result-stat strong { font: 900 18px/1 Consolas, monospace; }
  .invest-title { color: var(--gold); font-size: 11px; font-weight: 900; margin: 8px 0; }
  .investments { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; }
  .invest-card { min-height: 88px; display: grid; grid-template-columns: 46px 1fr auto; align-items: center; gap: 8px; padding: 7px; color: var(--ink); background: var(--panel); border: 2px solid var(--line); cursor: pointer; text-align: left; transition: transform .12s, border-color .12s, background .12s; }
  .invest-card:hover:not(:disabled) { transform: translateY(-3px); border-color: var(--gold); background: #303548; }
  .invest-card:disabled { opacity: .35; cursor: default; }
  .invest-card strong { display: block; font-size: 12px; margin-bottom: 4px; }
  .invest-card small { display: block; color: var(--muted); font-size: 9px; line-height: 1.35; }
  .invest-face { width: 42px; height: 48px; position: relative; background: var(--staff-color, #65a8df); border: 3px solid #111522; }
  .invest-face::before { content: ""; position: absolute; left: 8px; top: 5px; width: 20px; height: 20px; border-radius: 50%; background: #efc7a2; border: 2px solid #422f31; }
  .invest-face::after { content: ""; position: absolute; left: 6px; bottom: 3px; width: 25px; height: 13px; background: #efc7a2; border: 2px solid #422f31; border-bottom: 0; }
  .seat-art { width: 44px; height: 44px; position: relative; border: 3px solid #9b4b50; background: #742f39; box-shadow: 0 12px 0 #742f39, 0 15px 0 #301f24; }
  .price { color: var(--gold); font: 900 14px/1 Consolas, monospace; white-space: nowrap; align-self: start; margin-top: 4px; }
  .skip-invest { margin-top: 8px; padding: 7px 10px; color: var(--muted); background: transparent; border: 1px solid #596179; cursor: pointer; }
  .skip-invest:hover { color: var(--ink); border-color: var(--muted); }
  .final-panel { text-align: center; padding: 18px; }
  .final-panel h2 { margin: 0 0 8px; color: var(--gold); }
  .final-panel p { margin: 0 0 16px; color: var(--muted); line-height: 1.6; }
  .restart-btn { padding: 11px 28px; color: white; background: var(--red); border: 3px solid #ff8a74; box-shadow: 0 4px 0 #7e2631; cursor: pointer; font-weight: 900; }

  @media (max-width: 760px) {
    body { padding: 0; }
    .game-shell { border-left: 0; border-right: 0; }
    .marquee { grid-template-columns: 1fr; }
    .hud { justify-content: space-between; gap: 4px; }
    .hud-item { flex: 1; min-width: 0; }
    .sound-btn { width: 30px; height: 30px; flex: 0 0 30px; }
    .prep-panel { grid-template-columns: 1fr; }
    .start-wrap { grid-template-columns: 1fr; }
    .job-button { width: 62px; height: 62px; }
    .job-art { transform: translate(-50%, -50%) scale(.78); }
    .job-name { font-size: 9px; }
    .work-point { width: 42px; height: 42px; }
    .result-head { grid-template-columns: 1fr 1fr; }
    .investments { grid-template-columns: 1fr; }
    .invest-card { min-height: 76px; }
  }
</style>
</head>
<body>
<div class="game-shell">
  <header class="marquee">
    <div class="brand-row">
      <span class="brand">PoC</span>
      <div>
        <h1>작은 서커스</h1>
        <div class="town" id="townLabel">첫 번째 마을 · 공연 준비</div>
      </div>
    </div>
    <div class="hud">
      <div class="hud-item"><span class="hud-icon coin-icon"></span><span class="hud-label">돈</span><span class="hud-value" id="moneyValue">10</span></div>
      <div class="hud-item"><span class="hud-icon day-icon"></span><span class="hud-label">날짜</span><span class="hud-value" id="dayValue">1/5</span></div>
      <div class="hud-item"><span class="hud-icon time-icon"></span><span class="hud-label">준비</span><span class="hud-value" id="timeValue">3</span></div>
      <button class="sound-btn" id="soundBtn" aria-label="소리 켜기 또는 끄기" title="소리"><span class="speaker"></span></button>
    </div>
  </header>

  <section class="scene-frame">
    <canvas id="scene" width="960" height="530" aria-label="작은 서커스 준비와 공연"></canvas>
    <div class="job-layer" id="jobLayer"></div>
    <div class="phase-banner" id="phaseBanner"></div>
    <div class="show-timer" id="showTimer"><div class="show-timer-fill" id="showTimerFill"></div></div>
  </section>

  <main class="control-area">
    <section class="prep-panel" id="prepPanel">
      <div class="staff-block">
        <div class="block-title">함께 일하는 사람</div>
        <div class="staff-list" id="staffList"></div>
      </div>
      <div class="start-wrap">
        <button class="show-button" id="startShow">문 열기</button>
        <div class="prep-note" id="prepNote"></div>
      </div>
    </section>

    <section class="result-panel" id="resultPanel">
      <div class="result-head">
        <div class="result-stat"><span>입장</span><strong id="resultAudience">0</strong></div>
        <div class="result-stat"><span>만족</span><strong id="resultMood">0%</strong></div>
        <div class="result-stat"><span>매출</span><strong id="resultGross">+0</strong></div>
        <div class="result-stat"><span>임금 후</span><strong id="resultNet">+0</strong></div>
      </div>
      <div class="invest-title">오늘 번 돈으로 하나 선택</div>
      <div class="investments" id="investments"></div>
      <button class="skip-invest" id="skipInvest">저축하고 다음 날</button>
    </section>

    <section class="final-panel" id="finalPanel">
      <h2>첫 마을 공연 종료</h2>
      <p id="finalSummary"></p>
      <button class="restart-btn" id="restartBtn">처음부터</button>
    </section>
  </main>
</div>

<script>
(() => {
  'use strict';

  const canvas = document.getElementById('scene');
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;

  const SHOW_MS = 5000;
  const MAX_DAYS = 5;
  const MAX_PREP = 3;
  const JOBS = {
    promo: { name: '홍보', art: 'promo', worker: '소피', color: '#d95555', hire: 11, wage: 1, bonus: '관객 +2', pos: [15, 48] },
    light: { name: '조명', art: 'light', worker: '에디', color: '#e0a94f', hire: 12, wage: 2, bonus: '만족 +8%', pos: [50, 24] },
    stage: { name: '무대', art: 'stage', worker: '로만', color: '#65a8df', hire: 13, wage: 2, bonus: '팁 +관객당 1', pos: [50, 53] },
    ticket: { name: '매표', art: 'ticket', worker: '마리', color: '#63c17b', hire: 11, wage: 1, bonus: '표값 +1', pos: [84, 49] },
  };
  const WORK_POINTS = {
    promo: [[8, 39], [18, 53], [28, 39]],
    light: [[35, 27], [50, 17], [65, 27]],
    stage: [[38, 57], [50, 42], [62, 57]],
    ticket: [[72, 39], [82, 53], [92, 39]],
  };
  const WORK_FEEDBACK = {
    promo: ['첫 포스터 부착', '길목 포스터 부착', '마지막 포스터 부착'],
    light: ['왼쪽 등불 점등', '중앙 등불 점등', '오른쪽 등불 점등'],
    stage: ['소품 상자 배치', '공연 고리 설치', '무대 표시 완료'],
    ticket: ['매표창 열기', '표와 잔돈 준비', '영업 표지 설치'],
  };
  const COLORS = ['#d9715d', '#e0a94f', '#65a8df', '#63c17b', '#9a7bd8'];

  let state;
  let showStart = 0;
  let showResult = null;
  let activeJob = null;
  let workStep = 0;
  let workDone = new Set();
  let soundOn = true;
  let audioContext = null;
  let bannerTimer = null;

  const $ = id => document.getElementById(id);
  const clamp = (value, min, max) => Math.max(min, Math.min(max, value));
  const easeOut = t => 1 - Math.pow(1 - clamp(t, 0, 1), 3);

  function freshState() {
    return {
      day: 1,
      money: 10,
      reputation: 0,
      prepLeft: MAX_PREP,
      phase: 'prep',
      prepared: { promo: false, light: false, stage: false, ticket: false },
      employees: {},
      seatLevel: 0,
      audience: [],
    };
  }

  function resetGame() {
    state = freshState();
    showResult = null;
    activeJob = null;
    workStep = 0;
    workDone = new Set();
    $('prepPanel').style.display = 'grid';
    $('resultPanel').classList.remove('on');
    $('finalPanel').classList.remove('on');
    beginPrepDay();
  }

  function beginPrepDay() {
    state.phase = 'prep';
    state.prepLeft = MAX_PREP;
    state.prepared = { promo: false, light: false, stage: false, ticket: false };
    state.audience = [];
    activeJob = null;
    workStep = 0;
    workDone = new Set();
    renderAll();
    drawScene(0);

    const staffed = Object.keys(state.employees);
    staffed.forEach((jobKey, index) => {
      setTimeout(() => {
        if (state.phase !== 'prep') return;
        state.prepared[jobKey] = true;
        setBanner(`${JOBS[jobKey].worker} · ${JOBS[jobKey].name} 준비`);
        playTone(350 + index * 70, .08, 'square', .035);
        renderAll();
        drawScene(0);
      }, 350 + index * 430);
    });
  }

  function renderAll() {
    $('moneyValue').textContent = state.money;
    $('dayValue').textContent = `${state.day}/${MAX_DAYS}`;
    $('timeValue').textContent = state.prepLeft;
    $('townLabel').textContent = state.phase === 'show' ? '첫 번째 마을 · 공연 중' : '첫 번째 마을 · 공연 준비';
    renderJobs();
    renderStaff();
    renderPrepNote();
  }

  function renderJobs() {
    const layer = $('jobLayer');
    if (state.phase !== 'prep') {
      layer.innerHTML = '';
      return;
    }

    if (activeJob) {
      layer.innerHTML = WORK_POINTS[activeJob].map((point, index) => `<button class="work-point" data-step="${index}" style="left:${point[0]}%;top:${point[1]}%" aria-label="${JOBS[activeJob].name} 준비 ${index + 1}"></button>`).join('');
      layer.querySelectorAll('.work-point').forEach(button => button.addEventListener('click', () => completeWorkPoint(button)));
      return;
    }

    layer.innerHTML = Object.entries(JOBS).map(([key, job]) => {
      const prepared = state.prepared[key];
      const staffed = Boolean(state.employees[key]);
      const locked = !prepared && !staffed && state.prepLeft <= 0;
      return `<button class="job-button ${prepared ? 'prepared' : ''} ${staffed ? 'staffed' : ''} ${locked ? 'locked' : ''}" data-job="${key}" style="left:${job.pos[0]}%;top:${job.pos[1]}%" ${prepared || staffed || locked ? 'disabled' : ''} title="${job.name}">
        ${staffed ? `<span class="job-staff">${job.worker.slice(0, 1)}</span>` : ''}
        ${prepared ? '<span class="job-check">✓</span>' : ''}
        <span class="job-art art-${job.art}"></span>
        <span class="job-name">${job.name}</span>
      </button>`;
    }).join('');
    layer.querySelectorAll('[data-job]').forEach(button => button.addEventListener('click', () => startManualJob(button.dataset.job)));
  }

  function renderStaff() {
    const employees = Object.entries(state.employees);
    if (!employees.length) {
      $('staffList').innerHTML = '<div class="staff-empty">아직 직원 없음</div>';
      return;
    }
    $('staffList').innerHTML = employees.map(([jobKey, employee]) => `<div class="staff-card">
      <span class="staff-face" style="--staff-color:${JOBS[jobKey].color}"></span>
      <span class="staff-copy"><strong>${employee.name}</strong><span>${JOBS[jobKey].name} 자동<br>${JOBS[jobKey].bonus} · 임금 ${JOBS[jobKey].wage}</span></span>
    </div>`).join('');
  }

  function renderPrepNote() {
    const done = Object.values(state.prepared).filter(Boolean).length;
    const missing = Object.entries(state.prepared).filter(([, value]) => !value).map(([key]) => JOBS[key].name);
    $('startShow').disabled = state.phase !== 'prep' || Boolean(activeJob);
    $('prepNote').textContent = activeJob ? `${JOBS[activeJob].name} 준비 ${workStep}/3` : missing.length ? `준비 ${done}/4 · ${missing.join(' · ')}` : '모든 준비 완료';
  }

  function startManualJob(jobKey) {
    if (state.phase !== 'prep' || state.prepared[jobKey] || state.employees[jobKey] || state.prepLeft <= 0) return;
    activeJob = jobKey;
    workStep = 0;
    workDone = new Set();
    setBanner(JOBS[jobKey].name);
    playTone(260, .06, 'square', .03);
    renderJobs();
    renderPrepNote();
  }

  function completeWorkPoint(button) {
    if (button.dataset.done) return;
    button.dataset.done = 'true';
    button.disabled = true;
    button.classList.add('done');
    const part = Number(button.dataset.step);
    workDone.add(part);
    workStep++;
    setBanner(WORK_FEEDBACK[activeJob][part]);
    playTone(330 + workStep * 80, .07, 'square', .035);
    renderPrepNote();
    drawScene(0);
    if (workStep < 3) return;
    const completedJob = activeJob;
    setTimeout(() => finishManualJob(completedJob), 230);
  }

  function finishManualJob(jobKey) {
    if (activeJob !== jobKey) return;
    state.prepared[jobKey] = true;
    state.prepLeft--;
    activeJob = null;
    workStep = 0;
    workDone = new Set();
    setBanner(`${JOBS[jobKey].name} 완료`);
    renderAll();
    drawScene(0);
  }

  function calculateShow() {
    const promoStaff = Boolean(state.employees.promo);
    const lightStaff = Boolean(state.employees.light);
    const stageStaff = Boolean(state.employees.stage);
    const ticketStaff = Boolean(state.employees.ticket);
    const demand = 5 + Math.floor(state.reputation / 3) + (state.prepared.promo ? 4 : 0) + (promoStaff ? 2 : 0) + Math.floor(Math.random() * 2);
    const capacity = 6 + state.seatLevel * 3;
    const queue = Math.min(demand, capacity);
    const gateLoss = state.prepared.ticket ? 0 : Math.min(2, Math.max(1, Math.floor(queue * .3)));
    const attendees = Math.max(1, queue - gateLoss);
    const satisfaction = clamp(.46 + (state.prepared.light ? .17 : 0) + (state.prepared.stage ? .22 : 0) + (lightStaff ? .08 : 0), .35, .98);
    const ticketPrice = state.prepared.ticket ? 2 : 1;
    const ticketIncome = attendees * (ticketPrice + (ticketStaff ? 1 : 0));
    const tips = Math.floor(attendees * satisfaction) + (stageStaff ? attendees : 0);
    const gross = ticketIncome + tips;
    const wages = Object.keys(state.employees).reduce((sum, key) => sum + JOBS[key].wage, 0);
    const net = gross - wages;
    const repGain = satisfaction >= .84 ? 2 : satisfaction >= .65 ? 1 : 0;
    return { demand, capacity, queue, gateLoss, attendees, satisfaction, ticketIncome, tips, gross, wages, net, repGain };
  }

  function startShow() {
    if (state.phase !== 'prep' || activeJob) return;
    ensureAudio();
    state.phase = 'show';
    showResult = calculateShow();
    createAudience(showResult);
    showStart = performance.now();
    $('prepPanel').style.display = 'none';
    $('jobLayer').innerHTML = '';
    $('showTimer').classList.add('on');
    playTone(220, .08, 'square', .05);
    setTimeout(() => playTone(330, .08, 'square', .045), 90);
    requestAnimationFrame(showLoop);
  }

  function showLoop(now) {
    const elapsed = now - showStart;
    const progress = Math.min(1, elapsed / SHOW_MS);
    $('showTimerFill').style.width = `${progress * 100}%`;
    if (elapsed < 1300) setBanner(showResult.gateLoss ? '관객 일부가 줄을 떠납니다' : '관객 입장');
    else if (elapsed < 4200) setBanner('공연 중');
    else setBanner('마지막 인사');
    drawScene(elapsed);
    if (elapsed < SHOW_MS) requestAnimationFrame(showLoop);
    else finishShow();
  }

  function finishShow() {
    state.phase = 'result';
    state.money += showResult.net;
    state.reputation += showResult.repGain;
    $('showTimer').classList.remove('on');
    hideBanner();
    $('moneyValue').textContent = state.money;
    $('resultAudience').textContent = `${showResult.attendees}/${showResult.demand}`;
    $('resultMood').textContent = `${Math.round(showResult.satisfaction * 100)}%`;
    $('resultGross').textContent = `+${showResult.gross}`;
    $('resultNet').textContent = `${showResult.net >= 0 ? '+' : ''}${showResult.net}`;
    playCoinSound();
    drawScene(SHOW_MS);

    if (state.day >= MAX_DAYS) {
      setTimeout(showFinal, 450);
      return;
    }
    renderInvestments();
    $('resultPanel').classList.add('on');
  }

  function renderInvestments() {
    const employeeCards = Object.entries(JOBS).filter(([key]) => !state.employees[key]).map(([key, job]) => ({
      key: `hire:${key}`,
      title: `${job.worker} 고용`,
      detail: `${job.name} 자동 · ${job.bonus} · 임금 ${job.wage}`,
      cost: job.hire,
      art: `<span class="invest-face" style="--staff-color:${job.color}"></span>`,
    }));
    const seatCost = 12 + state.seatLevel * 7;
    const options = [...employeeCards, {
      key: 'seat', title: '객석 늘리기', detail: `좌석 ${6 + state.seatLevel * 3} → ${9 + state.seatLevel * 3}`,
      cost: seatCost, art: '<span class="seat-art"></span>',
    }];
    $('investments').innerHTML = options.map(option => `<button class="invest-card" data-invest="${option.key}" ${state.money < option.cost ? 'disabled' : ''}>
      ${option.art}<span><strong>${option.title}</strong><small>${option.detail}</small></span><span class="price">${option.cost}</span>
    </button>`).join('');
    document.querySelectorAll('[data-invest]').forEach(button => button.addEventListener('click', () => invest(button.dataset.invest)));
  }

  function invest(key) {
    if (state.phase !== 'result') return;
    let cost;
    if (key.startsWith('hire:')) cost = JOBS[key.split(':')[1]].hire;
    else cost = 12 + state.seatLevel * 7;
    if (state.money < cost) return;
    state.money -= cost;
    if (key.startsWith('hire:')) {
      const jobKey = key.split(':')[1];
      state.employees[jobKey] = { name: JOBS[jobKey].worker };
      playInvestmentSound([300, 400, 520]);
    } else {
      state.seatLevel++;
      playInvestmentSound([180, 250, 340]);
    }
    nextDay();
  }

  function nextDay() {
    state.day++;
    $('resultPanel').classList.remove('on');
    $('prepPanel').style.display = 'grid';
    beginPrepDay();
  }

  function showFinal() {
    $('resultPanel').classList.remove('on');
    $('prepPanel').style.display = 'none';
    $('finalPanel').classList.add('on');
    const names = Object.keys(state.employees).map(key => JOBS[key].worker);
    $('finalSummary').textContent = `${names.length ? names.join(' · ') : '직원 없이'} 운영 · ${6 + state.seatLevel * 3}석 · 평판 ${state.reputation} · 보유금 ${state.money}`;
  }

  function createAudience(result) {
    const seats = seatPositions(result.capacity);
    state.audience = seats.slice(0, result.attendees).map((seat, index) => ({
      ...seat,
      index,
      side: index % 2 ? 1 : -1,
      delay: index * 80,
      color: COLORS[index % COLORS.length],
      moodSeed: (index * 37) % 100,
    }));
  }

  function seatPositions(count) {
    const positions = [];
    const rows = count > 9 ? 3 : 2;
    const perRow = Math.ceil(count / rows);
    for (let i = 0; i < count; i++) {
      const row = Math.floor(i / perRow);
      const inRow = i % perRow;
      const rowCount = Math.min(perRow, count - row * perRow);
      const spacing = Math.min(82, 590 / Math.max(1, rowCount - 1));
      const startX = 480 - (rowCount - 1) * spacing / 2;
      positions.push({ x: startX + inRow * spacing, y: 374 + row * 48, row });
    }
    return positions;
  }

  function drawScene(elapsed) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (state.phase === 'show' || state.phase === 'result' || state.phase === 'end') drawShowScene(elapsed);
    else drawPrepScene();
  }

  function drawPrepScene() {
    drawNightSky();
    ctx.fillStyle = '#35483a'; ctx.fillRect(0, 260, 960, 270);
    ctx.fillStyle = '#8b6844'; ctx.beginPath(); ctx.ellipse(480, 420, 410, 92, 0, 0, Math.PI * 2); ctx.fill();
    drawWagon(38, 247);
    drawTent(480, 250, .92);
    drawPosterBoard(115, 326);
    drawTicketBooth(810, 305);
    drawPrepProps();
    drawEmployees();
  }

  function drawShowScene(elapsed) {
    ctx.fillStyle = state.prepared.light ? '#3a2928' : '#181822'; ctx.fillRect(0, 0, 960, 530);
    ctx.fillStyle = '#6e3438'; ctx.fillRect(0, 0, 115, 530); ctx.fillRect(845, 0, 115, 530);
    ctx.fillStyle = '#b8464e';
    for (let x = 0; x < 960; x += 96) ctx.fillRect(x, 0, 48, 92);
    ctx.fillStyle = '#352521'; ctx.fillRect(0, 455, 960, 75);
    drawStageInterior(elapsed);
    drawShowSeats();
    drawAudience(elapsed);
    if (elapsed > 4200) drawConfetti(elapsed);
  }

  function drawNightSky() {
    ctx.fillStyle = '#252d46'; ctx.fillRect(0, 0, 960, 300);
    ctx.fillStyle = '#b9c5dc';
    for (let y = 20; y < 240; y += 31) for (let x = (y % 2) * 20; x < 960; x += 47) ctx.fillRect(x, y, 2, 2);
    ctx.fillStyle = '#f3d27a'; ctx.beginPath(); ctx.arc(828, 69, 31, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#252d46'; ctx.beginPath(); ctx.arc(842, 58, 28, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#171b2b';
    [[0,190,135,75],[118,215,112,50],[730,202,110,63],[825,178,135,87]].forEach(([x,y,w,h]) => {
      ctx.fillRect(x,y,w,h); ctx.beginPath(); ctx.moveTo(x-8,y); ctx.lineTo(x+w/2,y-42); ctx.lineTo(x+w+8,y); ctx.fill();
    });
  }

  function drawTent(cx, ground, scale) {
    ctx.save(); ctx.translate(cx, ground); ctx.scale(scale, scale);
    ctx.fillStyle = '#d95555'; ctx.fillRect(-245, 40, 490, 220);
    ctx.fillStyle = '#f0d28b'; for (let x = -245; x < 245; x += 72) ctx.fillRect(x, 40, 34, 220);
    ctx.fillStyle = '#8e303a'; ctx.beginPath(); ctx.moveTo(-270, 50); ctx.lineTo(0, -128); ctx.lineTo(270, 50); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#f4c95d'; ctx.lineWidth = 6; ctx.stroke();
    ctx.fillStyle = '#171520'; ctx.fillRect(-90, 105, 180, 155);
    ctx.fillStyle = '#a43842'; ctx.beginPath(); ctx.moveTo(-100, 92); ctx.lineTo(-28, 155); ctx.lineTo(-100, 260); ctx.fill(); ctx.beginPath(); ctx.moveTo(100, 92); ctx.lineTo(28, 155); ctx.lineTo(100, 260); ctx.fill();
    ctx.fillStyle = '#f4c95d'; ctx.fillRect(-8, -171, 16, 46); ctx.fillStyle = '#d95555'; ctx.beginPath(); ctx.moveTo(8,-171); ctx.lineTo(65,-155); ctx.lineTo(8,-139); ctx.fill();
    [-110, 0, 110].forEach((x, index) => {
      const on = prepPartReady('light', index);
      ctx.fillStyle = on ? '#fff0a8' : '#494454'; ctx.beginPath(); ctx.arc(x, 51, 8, 0, Math.PI * 2); ctx.fill();
      if (on) { ctx.save(); ctx.globalAlpha = .2; ctx.beginPath(); ctx.arc(x, 51, 25, 0, Math.PI * 2); ctx.fill(); ctx.restore(); }
    });
    ctx.restore();
  }

  function drawWagon(x, y) {
    ctx.fillStyle = '#315660'; ctx.fillRect(x, y, 155, 120); ctx.fillStyle = '#e7cf91'; ctx.fillRect(x, y, 155, 25);
    ctx.fillStyle = '#6e3c31'; ctx.fillRect(x+95, y+38, 42, 82); ctx.fillStyle = '#c99a4a'; ctx.fillRect(x+18,y+45,48,42);
    ctx.fillStyle = '#2f2725'; [x+35,x+123].forEach(wx => { ctx.beginPath(); ctx.arc(wx,y+126,23,0,Math.PI*2); ctx.fill(); ctx.strokeStyle='#a57b4d';ctx.lineWidth=5;ctx.stroke(); });
  }

  function drawPosterBoard(x, y) {
    ctx.fillStyle = '#4a352c'; ctx.fillRect(x-43,y-57,86,105); ctx.fillRect(x-31,y+48,8,42); ctx.fillRect(x+23,y+48,8,42);
    ctx.fillStyle = '#806e59'; ctx.fillRect(x-34,y-48,68,86);
    [[-23,-36],[3,-36],[-10,2]].forEach(([dx,dy], index) => {
      ctx.fillStyle = prepPartReady('promo', index) ? ['#d95555','#65a8df','#63c17b'][index] : '#5d5145';
      ctx.fillRect(x+dx,y+dy,21,30);
      if (prepPartReady('promo', index)) { ctx.fillStyle='#f4c95d'; drawStar(x+dx+10,y+dy+15,7,3); }
    });
  }

  function drawTicketBooth(x, y) {
    ctx.fillStyle = '#49352b'; ctx.fillRect(x-58,y-56,116,125); ctx.fillStyle='#704535';ctx.fillRect(x-70,y-75,140,24);
    ctx.fillStyle = prepPartReady('ticket', 0) ? '#f0d28b' : '#191821'; ctx.fillRect(x-38,y-34,76,48);
    ctx.fillStyle='#d95555';ctx.fillRect(x-45,y+34,90,16);
    ctx.fillStyle = prepPartReady('ticket', 1) ? '#7e5634' : '#2d2929'; ctx.fillRect(x-22,y-22,44,23);
    if (prepPartReady('ticket', 1)) { ctx.fillStyle='#f0d28b'; for(let i=0;i<3;i++)ctx.fillRect(x-16+i*11,y-18,8,15); }
    ctx.fillStyle = prepPartReady('ticket', 2) ? '#63c17b' : '#37313a'; ctx.fillRect(x-34,y-68,68,17);
    if (prepPartReady('ticket', 2)) { ctx.fillStyle='#173127';ctx.fillRect(x-21,y-63,42,6); }
  }

  function drawPrepProps() {
    ctx.fillStyle = prepPartReady('stage', 0) ? '#65a8df' : '#473f46'; ctx.fillRect(410,365,38,38);
    ctx.strokeStyle = prepPartReady('stage', 1) ? '#f4c95d' : '#514853'; ctx.lineWidth=5;ctx.beginPath();ctx.arc(480,378,36,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle = prepPartReady('stage', 2) ? '#d95555' : '#473f46'; ctx.fillRect(512,368,45,35);
    if (prepPartReady('stage', 2)) { ctx.fillStyle='#f4c95d';drawStar(534,385,12,5); }
  }

  function prepPartReady(jobKey, index) {
    return state.prepared[jobKey] || (activeJob === jobKey && workDone.has(index));
  }

  function drawEmployees() {
    Object.keys(state.employees).forEach((key, index) => {
      const pos = { promo:[150,390], light:[374,304], stage:[480,390], ticket:[812,405] }[key];
      drawPerson(pos[0], pos[1], JOBS[key].color, Math.sin(performance.now()/180+index)*3, false);
    });
  }

  function drawStageInterior(elapsed) {
    const lit = state.prepared.light;
    if (lit) {
      ctx.save(); ctx.globalAlpha=.24; ctx.fillStyle='#fff0a8';
      ctx.beginPath();ctx.moveTo(250,0);ctx.lineTo(330,370);ctx.lineTo(520,370);ctx.lineTo(350,0);ctx.fill();
      ctx.beginPath();ctx.moveTo(610,0);ctx.lineTo(460,370);ctx.lineTo(650,370);ctx.lineTo(710,0);ctx.fill();ctx.restore();
    }
    ctx.fillStyle='#5a3a2b';ctx.fillRect(220,330,520,42);ctx.fillStyle='#774c34';ctx.fillRect(235,320,490,18);
    const active = Math.max(0, elapsed - 1200);
    const prepared = state.prepared.stage;
    drawPerformer(410, 291, '#65a8df', active, prepared ? 26 : 8, true);
    drawPerformer(555, 296, '#63c17b', active, prepared ? 12 : 5, false);
    if (prepared) { ctx.strokeStyle='#f4c95d';ctx.lineWidth=6;ctx.beginPath();ctx.arc(485,280,48+Math.sin(active/180)*3,0,Math.PI*2);ctx.stroke(); }
  }

  function drawPerformer(x, y, color, time, jumpHeight, lead) {
    const jump = state.phase === 'show' && time > 0 ? Math.abs(Math.sin(time/(lead?230:310))) * jumpHeight : 0;
    ctx.save();ctx.translate(x+Math.sin(time/170)*4,y-jump);
    drawPerson(0,0,color,0,true);
    if (lead && state.phase==='show' && time>0) for(let i=0;i<3;i++){const a=time/320+i*Math.PI*2/3;ctx.fillStyle=COLORS[i];ctx.beginPath();ctx.arc(Math.cos(a)*35,-52+Math.sin(a)*15,7,0,Math.PI*2);ctx.fill();}
    ctx.restore();
  }

  function drawPerson(x, y, color, sway, local) {
    ctx.save(); if (!local) ctx.translate(x+sway,y); else ctx.translate(x,y);
    ctx.fillStyle='#1a1720';ctx.fillRect(-12,30,8,18);ctx.fillRect(5,30,8,18);
    ctx.fillStyle=color;ctx.fillRect(-18,-5,36,37);
    ctx.fillStyle='#efc7a2';ctx.beginPath();ctx.arc(0,-19,14,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#422f31';ctx.lineWidth=3;ctx.stroke();
    ctx.fillStyle=color;ctx.fillRect(-16,-35,32,8);ctx.fillStyle='#422f31';ctx.fillRect(-7,-20,3,3);ctx.fillRect(5,-20,3,3);
    ctx.restore();
  }

  function drawShowSeats() {
    seatPositions(showResult ? showResult.capacity : 6).forEach(seat => { ctx.fillStyle='#742f39';ctx.fillRect(seat.x-14,seat.y-2,28,18);ctx.fillStyle='#9e4850';ctx.fillRect(seat.x-12,seat.y,24,8);ctx.fillStyle='#33252b';ctx.fillRect(seat.x-11,seat.y+16,4,10);ctx.fillRect(seat.x+7,seat.y+16,4,10); });
  }

  function drawAudience(elapsed) {
    if (!state.audience.length) return;
    const showProgress=clamp((elapsed-1300)/2700,0,1);
    state.audience.forEach(person=>{
      const arrival=easeOut((elapsed-person.delay)/850);let x=person.side<0?-30:990;let y=468;x+=(person.x-x)*arrival;y+=(person.y-25-y)*arrival;
      const happy=showResult.satisfaction>person.moodSeed/110;const bob=elapsed>1300&&happy?Math.abs(Math.sin(elapsed/145+person.index))*8*showProgress:0;
      drawAudiencePerson(x,y-bob,person.color,happy&&elapsed>1300,person.index,elapsed);
    });
  }

  function drawAudiencePerson(x,y,color,cheering,index,elapsed){ctx.save();ctx.translate(x,y);ctx.fillStyle=color;ctx.fillRect(-10,9,20,24);ctx.fillStyle='#e8c29d';ctx.beginPath();ctx.arc(0,0,10,0,Math.PI*2);ctx.fill();ctx.fillStyle='#392c30';ctx.fillRect(-8,-7,16,5);if(cheering){const wave=Math.sin(elapsed/100+index)*4;ctx.strokeStyle='#e8c29d';ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(-8,13);ctx.lineTo(-16,-3+wave);ctx.moveTo(8,13);ctx.lineTo(16,-3-wave);ctx.stroke();if(elapsed>2500&&index%3===0){ctx.fillStyle='#f4c95d';drawStar(0,-28,5,2);}}ctx.restore();}
  function drawConfetti(elapsed){const t=clamp((elapsed-4200)/800,0,1);for(let i=0;i<18;i++){ctx.fillStyle=COLORS[i%COLORS.length];ctx.fillRect(310+(i*53%340),140+((i*31)%120)-t*70,7,7);}}
  function drawStar(x,y,outer,inner){ctx.beginPath();for(let i=0;i<10;i++){const radius=i%2===0?outer:inner;const angle=-Math.PI/2+i*Math.PI/5;const px=x+Math.cos(angle)*radius;const py=y+Math.sin(angle)*radius;if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);}ctx.closePath();ctx.fill();}

  function setBanner(text) {
    const banner = $('phaseBanner');
    banner.textContent = text;
    banner.classList.add('on');
    clearTimeout(bannerTimer);
    if (state.phase !== 'show') bannerTimer = setTimeout(hideBanner, 900);
  }
  function hideBanner() { $('phaseBanner').classList.remove('on'); }
  function ensureAudio(){if(!soundOn)return;if(!audioContext)audioContext=new(window.AudioContext||window.webkitAudioContext)();if(audioContext.state==='suspended')audioContext.resume();}
  function playTone(freq,duration,type='square',volume=.03){if(!soundOn)return;ensureAudio();const osc=audioContext.createOscillator();const gain=audioContext.createGain();osc.type=type;osc.frequency.value=freq;gain.gain.setValueAtTime(volume,audioContext.currentTime);gain.gain.exponentialRampToValueAtTime(.0001,audioContext.currentTime+duration);osc.connect(gain);gain.connect(audioContext.destination);osc.start();osc.stop(audioContext.currentTime+duration);}
  function playCoinSound(){[620,780,980].forEach((freq,i)=>setTimeout(()=>playTone(freq,.12,'square',.04),i*90));}
  function playInvestmentSound(notes){notes.forEach((freq,i)=>setTimeout(()=>playTone(freq,.1,'square',.04),i*80));}

  $('startShow').addEventListener('click', startShow);
  $('skipInvest').addEventListener('click', () => { if (state.phase === 'result') nextDay(); });
  $('restartBtn').addEventListener('click', resetGame);
  $('soundBtn').addEventListener('click', () => { soundOn=!soundOn;$('soundBtn').classList.toggle('muted',!soundOn);if(soundOn)playTone(440,.08,'square',.04); });
  resetGame();
})();
</script>
</body>
