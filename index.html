<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>오늘의 작은 공연</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #201812;
      --paper: #f4dfb2;
      --red: #a83d34;
      --gold: #efb64d;
      --blue: #315d6b;
      --green: #536c48;
      --panel: #211913;
      --line: #8d6840;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: #17110e;
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
      color: var(--paper);
      overflow-x: hidden;
    }

    button {
      font: inherit;
      color: inherit;
      border: 0;
      cursor: pointer;
      touch-action: manipulation;
    }

    .game {
      width: min(100%, 1180px);
      height: 100vh;
      height: 100dvh;
      margin: 0 auto;
      display: grid;
      grid-template-rows: 64px minmax(0, 1fr) 164px;
      background: #261b15;
      box-shadow: 0 0 70px #000;
      overflow: hidden;
    }

    .topbar {
      min-height: 64px;
      display: grid;
      grid-template-columns: 1fr minmax(180px, 420px) 1fr;
      align-items: center;
      gap: 20px;
      padding: 10px 22px;
      background: #18110e;
      border-bottom: 2px solid #6f4d31;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      white-space: nowrap;
    }

    .tent-mark {
      width: 34px;
      height: 30px;
      position: relative;
      display: inline-block;
    }

    .tent-mark::before {
      content: "";
      position: absolute;
      inset: 5px 1px 0;
      background: repeating-linear-gradient(90deg, var(--red) 0 7px, #efd496 7px 14px);
      clip-path: polygon(50% 0, 100% 57%, 88% 57%, 88% 100%, 12% 100%, 12% 57%, 0 57%);
      border-bottom: 2px solid var(--gold);
    }

    .tent-mark::after {
      content: "";
      position: absolute;
      left: 16px;
      top: 0;
      width: 2px;
      height: 9px;
      background: var(--gold);
      box-shadow: 5px 1px 0 -1px var(--red);
    }

    .show-progress {
      height: 12px;
      border: 2px solid #765638;
      background: #0d0908;
      overflow: hidden;
    }

    .show-progress > i {
      display: block;
      width: 0;
      height: 100%;
      background: linear-gradient(90deg, #d78534, #f1c45d);
      transition: width 180ms linear;
    }

    .crowd-meter {
      justify-self: end;
      display: flex;
      align-items: center;
      gap: 9px;
      min-width: 140px;
    }

    .crowd-meter strong {
      min-width: 38px;
      font-size: 18px;
      text-align: right;
      color: #ffd66f;
    }

    .faces {
      display: flex;
      gap: 3px;
    }

    .face {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #735745;
      opacity: .35;
      transition: 180ms ease;
    }

    .face.on {
      background: var(--gold);
      opacity: 1;
      transform: translateY(-2px);
    }

    .stage-wrap {
      position: relative;
      min-height: 0;
      overflow: hidden;
      background: #261915;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .curtain {
      position: absolute;
      inset: 0;
      z-index: 4;
      display: grid;
      place-items: center;
      background:
        linear-gradient(90deg, rgba(79, 20, 19, .97), rgba(158, 48, 39, .98) 31%, rgba(91, 20, 18, .98) 49%, rgba(158, 48, 39, .98) 69%, rgba(79, 20, 19, .97));
      transition: transform 850ms cubic-bezier(.7, 0, .2, 1), opacity 550ms ease;
    }

    .curtain::before {
      content: "";
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(90deg, transparent 0 13%, rgba(0,0,0,.16) 14% 17%);
      pointer-events: none;
    }

    .curtain.open {
      transform: translateY(-102%);
      opacity: .2;
      pointer-events: none;
    }

    .start-card {
      position: relative;
      width: min(88%, 480px);
      padding: 30px;
      text-align: center;
      background: #241712;
      border: 3px double #d59d4b;
      box-shadow: 0 18px 40px #0009;
    }

    .start-card h1 {
      margin: 0 0 8px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(26px, 5vw, 42px);
      letter-spacing: 0;
      color: #f6d88d;
    }

    .start-card p {
      margin: 0 0 24px;
      color: #cdbb9d;
      font-size: 14px;
    }

    .start-button, .replay-button {
      min-height: 52px;
      padding: 0 28px;
      background: var(--red);
      border: 2px solid #f0c66e;
      box-shadow: 0 5px 0 #5f221e;
      font-weight: 800;
      font-size: 17px;
    }

    .start-button:active, .replay-button:active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 #5f221e;
    }

    .act-banner {
      position: absolute;
      z-index: 3;
      top: 28px;
      left: 50%;
      min-width: 230px;
      padding: 9px 22px;
      transform: translate(-50%, -20px);
      text-align: center;
      background: #17100ddd;
      border: 1px solid #c18b45;
      box-shadow: 0 8px 18px #0007;
      font-weight: 800;
      opacity: 0;
      transition: 250ms ease;
      pointer-events: none;
    }

    .act-banner.show {
      transform: translate(-50%, 0);
      opacity: 1;
    }

    .callout {
      position: absolute;
      z-index: 2;
      left: 50%;
      top: 23%;
      transform: translate(-50%, -10px) scale(.95);
      min-width: 170px;
      padding: 10px 14px;
      text-align: center;
      color: #332315;
      background: #fff0c8;
      border: 3px solid #4d3725;
      border-radius: 50%;
      font-weight: 900;
      opacity: 0;
      transition: 160ms ease;
      pointer-events: none;
    }

    .callout.show {
      opacity: 1;
      transform: translate(-50%, 0) scale(1);
    }

    .callout::after {
      content: "";
      position: absolute;
      left: 45%;
      bottom: -17px;
      border: 10px solid transparent;
      border-top-color: #4d3725;
      transform: rotate(8deg);
    }

    .controls {
      min-height: 164px;
      padding: 14px 20px 20px;
      background: #17110e;
      border-top: 2px solid #775235;
    }

    .control-panel {
      min-height: 128px;
      display: none;
      align-items: center;
      justify-content: center;
      gap: 18px;
    }

    .control-panel.active { display: flex; }

    .task-label {
      width: 132px;
      color: #d9c4a0;
      font-size: 14px;
      line-height: 1.4;
    }

    .task-label strong {
      display: block;
      margin-bottom: 4px;
      color: #fff0c8;
      font-size: 18px;
    }

    .prop-rack {
      display: flex;
      gap: 12px;
    }

    .prop {
      width: 86px;
      height: 92px;
      display: grid;
      place-items: center;
      background: #2a2019;
      border: 2px solid #765334;
      box-shadow: inset 0 -8px 0 #1b130f;
      transition: 120ms ease;
    }

    .prop:hover, .prop:focus-visible {
      border-color: #f0bf63;
      transform: translateY(-3px);
    }

    .prop:active { transform: translateY(2px); }

    .prop span { font-size: 44px; line-height: 1; }
    .prop em { font-size: 11px; color: #c8af8b; font-style: normal; }

    .hold-control {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .gauge {
      position: relative;
      width: 58px;
      height: 112px;
      padding: 5px;
      background: #0b0807;
      border: 3px solid #78593b;
      overflow: hidden;
    }

    .gauge .target {
      position: absolute;
      z-index: 2;
      left: 3px;
      right: 3px;
      bottom: 56%;
      height: 22%;
      border: 2px solid #ffd66f;
      background: #ffd66f33;
    }

    .gauge .fill {
      position: absolute;
      left: 5px;
      right: 5px;
      bottom: 5px;
      height: 0;
      background: linear-gradient(#f4c250, #a9432e);
      transition: height 40ms linear;
    }

    .lever {
      width: 132px;
      height: 96px;
      display: grid;
      place-items: center;
      background: #35261c;
      border: 3px solid #8c6843;
      box-shadow: 0 6px 0 #0b0807;
      user-select: none;
      -webkit-user-select: none;
    }

    .lever svg { width: 54px; height: 54px; }
    .lever.held {
      transform: translateY(4px);
      background: #593b24;
      box-shadow: 0 2px 0 #0b0807;
    }

    .attempts {
      display: flex;
      gap: 8px;
    }

    .attempts i {
      width: 14px;
      height: 14px;
      border: 2px solid #a88352;
      border-radius: 50%;
    }

    .attempts i.done { background: var(--gold); }

    .fire-control .gauge {
      width: 180px;
      height: 38px;
    }

    .fire-control .gauge .target {
      top: 3px;
      bottom: 3px;
      left: 48%;
      right: auto;
      width: 28%;
      height: auto;
    }

    .fire-control .gauge .fill {
      top: 5px;
      bottom: 5px;
      left: 5px;
      width: 0;
      height: auto;
      transition: width 40ms linear;
    }

    .bellows {
      width: 140px;
      height: 92px;
      background: #35261c;
      border: 3px solid #8c6843;
      box-shadow: 0 6px 0 #0b0807;
      user-select: none;
      -webkit-user-select: none;
    }

    .bellows svg {
      width: 76px;
      height: 58px;
      transition: transform 80ms ease;
    }

    .bellows.held {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #0b0807;
    }

    .bellows.held svg { transform: scaleX(.72); }

    .result {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 28px;
      min-height: 128px;
    }

    .result.active { display: flex; }

    .result-score {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .result-score b {
      font-family: Georgia, serif;
      font-size: 50px;
      line-height: 1;
      color: #ffd66f;
    }

    .result-score span {
      max-width: 180px;
      color: #cdbb9d;
      font-size: 13px;
      line-height: 1.45;
    }

    .spark {
      position: absolute;
      z-index: 2;
      font-size: 28px;
      pointer-events: none;
      animation: spark 850ms ease-out forwards;
    }

    @keyframes spark {
      from { transform: translate(-50%, 0) scale(.6); opacity: 1; }
      to { transform: translate(-50%, -80px) scale(1.25); opacity: 0; }
    }

    .shake { animation: shake 240ms linear; }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    @media (max-width: 720px) {
      .game { grid-template-rows: 56px minmax(260px, 1fr) 190px; }
      .topbar {
        min-height: 56px;
        grid-template-columns: auto 1fr auto;
        gap: 10px;
        padding: 8px 10px;
      }
      .brand span:last-child { display: none; }
      .crowd-meter { min-width: 80px; }
      .faces .face:nth-child(-n+2) { display: none; }
      .stage-wrap { min-height: 260px; }
      .controls { padding: 10px; min-height: 190px; }
      .control-panel { min-height: 168px; gap: 10px; flex-wrap: wrap; }
      .task-label { width: 100%; text-align: center; }
      .task-label strong { display: inline; margin-right: 6px; }
      .prop { width: 72px; height: 78px; }
      .prop span { font-size: 34px; }
      .lever, .bellows { height: 80px; }
      .result { flex-wrap: wrap; gap: 14px; }
    }
  </style>
</head>
<body>
  <main class="game">
    <header class="topbar">
      <div class="brand"><i class="tent-mark"></i><span>오늘의 작은 공연</span></div>
      <div class="show-progress" aria-label="공연 진행"><i id="progressFill"></i></div>
      <div class="crowd-meter" aria-label="관객 반응">
        <div class="faces" id="faces" aria-hidden="true"></div>
        <strong id="scoreText">0</strong>
      </div>
    </header>

    <section class="stage-wrap" id="stageWrap">
      <canvas id="scene" width="1280" height="720" aria-label="서커스 공연 무대"></canvas>
      <div class="act-banner" id="actBanner"></div>
      <div class="callout" id="callout"></div>
      <div class="curtain" id="curtain">
        <div class="start-card">
          <h1>오늘의 작은 공연</h1>
          <p>세 단원의 공연을 무대 뒤에서 완성한다</p>
          <button class="start-button" id="startButton">공연 시작</button>
        </div>
      </div>
    </section>

    <section class="controls" id="controls">
      <div class="control-panel" id="jugglePanel">
        <div class="task-label"><strong>소품대</strong>무대에서 찾는 물건 전달</div>
        <div class="prop-rack">
          <button class="prop" data-prop="ball" title="공">
            <span aria-hidden="true">●</span><em>공</em>
          </button>
          <button class="prop" data-prop="club" title="곤봉">
            <span aria-hidden="true">◆</span><em>곤봉</em>
          </button>
          <button class="prop" data-prop="ring" title="링">
            <span aria-hidden="true">○</span><em>링</em>
          </button>
        </div>
      </div>

      <div class="control-panel" id="aerialPanel">
        <div class="task-label"><strong>안전줄</strong>당겨서 올리고 금색 구간에서 놓기</div>
        <div class="hold-control">
          <div class="gauge" aria-label="안전줄 장력">
            <i class="target"></i><i class="fill" id="ropeFill"></i>
          </div>
          <button class="lever" id="ropeLever" title="안전줄을 당기고 놓기">
            <svg viewBox="0 0 64 64" aria-hidden="true">
              <path d="M34 5v35" stroke="#e2c48b" stroke-width="7" stroke-linecap="round"/>
              <path d="M15 39h38l-7 18H22z" fill="#a43c33" stroke="#edc26d" stroke-width="3"/>
              <circle cx="34" cy="8" r="7" fill="#edc26d"/>
            </svg>
          </button>
          <div class="attempts" id="ropeAttempts"><i></i><i></i></div>
        </div>
      </div>

      <div class="control-panel fire-control" id="firePanel">
        <div class="task-label"><strong>불쇼 화력</strong>손잡이를 눌러 불꽃을 금색 안에 유지</div>
        <div class="hold-control">
          <button class="bellows" id="bellows" title="풀무 누르기">
            <svg viewBox="0 0 90 64" aria-hidden="true">
              <path d="M11 19l40-12 24 24-24 25-40-12z" fill="#a43c33" stroke="#edc26d" stroke-width="4"/>
              <path d="M73 26h14v10H73" fill="#6c5338" stroke="#edc26d" stroke-width="3"/>
              <circle cx="18" cy="32" r="7" fill="#edc26d"/>
            </svg>
          </button>
          <div class="gauge" aria-label="불꽃 세기">
            <i class="target"></i><i class="fill" id="fireFill"></i>
          </div>
        </div>
      </div>

      <div class="result" id="resultPanel">
        <div class="result-score"><b id="finalScore">0</b><span id="finalCopy"></span></div>
        <button class="replay-button" id="replayButton">다시 공연</button>
      </div>
    </section>
  </main>

  <script>
    (() => {
      const canvas = document.querySelector("#scene");
      const ctx = canvas.getContext("2d");
      const stageWrap = document.querySelector("#stageWrap");
      const curtain = document.querySelector("#curtain");
      const startButton = document.querySelector("#startButton");
      const replayButton = document.querySelector("#replayButton");
      const actBanner = document.querySelector("#actBanner");
      const callout = document.querySelector("#callout");
      const progressFill = document.querySelector("#progressFill");
      const scoreText = document.querySelector("#scoreText");
      const faces = document.querySelector("#faces");
      const ropeFill = document.querySelector("#ropeFill");
      const fireFill = document.querySelector("#fireFill");
      const ropeLever = document.querySelector("#ropeLever");
      const bellows = document.querySelector("#bellows");
      const ropeAttempts = [...document.querySelectorAll("#ropeAttempts i")];
      const panels = {
        juggle: document.querySelector("#jugglePanel"),
        aerial: document.querySelector("#aerialPanel"),
        fire: document.querySelector("#firePanel")
      };
      const resultPanel = document.querySelector("#resultPanel");
      const finalScore = document.querySelector("#finalScore");
      const finalCopy = document.querySelector("#finalCopy");

      for (let i = 0; i < 5; i++) {
        const face = document.createElement("i");
        face.className = "face";
        faces.appendChild(face);
      }

      const faceNodes = [...faces.children];
      const propSymbols = { ball: "●", club: "◆", ring: "○" };
      const propNames = { ball: "공", club: "곤봉", ring: "링" };
      const actDurations = { juggle: 14500, aerial: 14500, fire: 13500 };
      const totalDuration = Object.values(actDurations).reduce((a, b) => a + b, 0) + 4800;

      let audio;
      let state;
      let raf;
      let lastTime = performance.now();

      function freshState() {
        return {
          phase: "intro",
          phaseTime: 0,
          elapsed: 0,
          score: 0,
          mood: 1,
          request: null,
          requestTime: 0,
          requestsDone: 0,
          jugglingCount: 2,
          rope: 0.12,
          ropeHeld: false,
          ropeDirection: 1,
          ropeTries: 0,
          aerialJump: 0,
          fire: 0.3,
          bellowsHeld: false,
          fireQuality: 0,
          fireSamples: 0,
          crowdPulse: 0,
          missPulse: 0,
          sparks: [],
          result: false
        };
      }

      function initAudio() {
        if (!audio) audio = new (window.AudioContext || window.webkitAudioContext)();
        if (audio.state === "suspended") audio.resume();
      }

      function tone(freq, duration = 0.08, type = "sine", gain = 0.035, delay = 0) {
        if (!audio) return;
        const osc = audio.createOscillator();
        const amp = audio.createGain();
        const start = audio.currentTime + delay;
        osc.type = type;
        osc.frequency.setValueAtTime(freq, start);
        amp.gain.setValueAtTime(gain, start);
        amp.gain.exponentialRampToValueAtTime(0.001, start + duration);
        osc.connect(amp).connect(audio.destination);
        osc.start(start);
        osc.stop(start + duration);
      }

      function cheer(strength = 1) {
        tone(330, .12, "triangle", .03 * strength);
        tone(440, .12, "triangle", .025 * strength, .05);
        tone(590, .16, "triangle", .02 * strength, .1);
      }

      function showBanner(text) {
        actBanner.textContent = text;
        actBanner.classList.add("show");
        setTimeout(() => actBanner.classList.remove("show"), 1600);
      }

      function setPanel(name) {
        Object.values(panels).forEach(panel => panel.classList.remove("active"));
        resultPanel.classList.remove("active");
        if (name && panels[name]) panels[name].classList.add("active");
      }

      function startShow() {
        initAudio();
        cancelAnimationFrame(raf);
        state = freshState();
        curtain.classList.add("open");
        resultPanel.classList.remove("active");
        progressFill.style.width = "0%";
        setTimeout(() => enterPhase("juggle"), 850);
        lastTime = performance.now();
        raf = requestAnimationFrame(loop);
      }

      function enterPhase(phase) {
        state.phase = phase;
        state.phaseTime = 0;
        callout.classList.remove("show");
        setPanel(phase);
        if (phase === "juggle") {
          showBanner("첫 순서 · 저글링");
          setTimeout(nextPropRequest, 1000);
        } else if (phase === "aerial") {
          showBanner("두 번째 순서 · 공중곡예");
          state.rope = 0.12;
          state.ropeTries = 0;
          ropeAttempts.forEach(i => i.classList.remove("done"));
        } else if (phase === "fire") {
          showBanner("마지막 순서 · 불쇼");
          state.fire = 0.3;
          state.fireQuality = 0;
          state.fireSamples = 0;
        } else if (phase === "finale") {
          setPanel(null);
          showBanner("공연 종료");
          cheer(1.3);
          setTimeout(finishShow, 2300);
        }
      }

      function nextPropRequest() {
        if (state.phase !== "juggle") return;
        const choices = ["ball", "club", "ring"];
        state.request = choices[Math.floor(Math.random() * choices.length)];
        state.requestTime = 0;
        callout.textContent = `${propSymbols[state.request]} ${propNames[state.request]}!`;
        callout.classList.add("show");
      }

      function chooseProp(prop, button) {
        if (state.phase !== "juggle" || !state.request) return;
        if (prop === state.request) {
          state.score += 7;
          state.mood = Math.min(5, state.mood + .65);
          state.jugglingCount = Math.min(6, state.jugglingCount + 1);
          state.crowdPulse = 1;
          state.requestsDone += 1;
          sparkAt(50, 47, "+박수");
          cheer(.75);
        } else {
          state.score = Math.max(0, state.score - 2);
          state.mood = Math.max(0, state.mood - .35);
          state.missPulse = 1;
          stageWrap.classList.add("shake");
          setTimeout(() => stageWrap.classList.remove("shake"), 260);
          tone(150, .16, "sawtooth", .025);
        }
        callout.classList.remove("show");
        state.request = null;
        button.blur();
        setTimeout(nextPropRequest, 850);
      }

      function releaseRope() {
        if (state.phase !== "aerial" || !state.ropeHeld) return;
        state.ropeHeld = false;
        ropeLever.classList.remove("held");
        const good = state.rope >= .56 && state.rope <= .78;
        state.ropeTries += 1;
        state.aerialJump = 1;
        ropeAttempts[state.ropeTries - 1]?.classList.add("done");
        if (good) {
          state.score += 14;
          state.mood = Math.min(5, state.mood + 1);
          state.crowdPulse = 1;
          sparkAt(50, 35, "완벽!");
          cheer(1);
        } else {
          state.score += 4;
          state.mood = Math.max(0, state.mood - .25);
          state.missPulse = 1;
          sparkAt(50, 45, "휘청");
          tone(170, .18, "square", .02);
        }
        state.rope = .12;
      }

      function finishShow() {
        state.result = true;
        state.phase = "result";
        setPanel(null);
        resultPanel.classList.add("active");
        const score = Math.round(state.score);
        finalScore.textContent = score;
        finalCopy.textContent = score >= 72
          ? "관객이 자리를 뜨지 않고 계속 박수친 공연"
          : score >= 50
            ? "몇 번 흔들렸지만 끝까지 분위기를 살린 공연"
            : "공연은 끝났다. 손이 바빴던 순서를 다시 확인할 차례";
        progressFill.style.width = "100%";
      }

      function sparkAt(x, y, text) {
        const node = document.createElement("b");
        node.className = "spark";
        node.textContent = text;
        node.style.left = `${x}%`;
        node.style.top = `${y}%`;
        stageWrap.appendChild(node);
        setTimeout(() => node.remove(), 900);
      }

      function update(dt) {
        if (!state || state.phase === "intro" || state.phase === "result") return;
        state.phaseTime += dt;
        state.elapsed += dt;
        state.crowdPulse = Math.max(0, state.crowdPulse - dt / 550);
        state.missPulse = Math.max(0, state.missPulse - dt / 500);
        state.aerialJump = Math.max(0, state.aerialJump - dt / 850);

        if (state.phase === "juggle") {
          if (state.request) {
            state.requestTime += dt;
            if (state.requestTime > 2800) {
              state.request = null;
              callout.classList.remove("show");
              state.mood = Math.max(0, state.mood - .45);
              state.jugglingCount = Math.max(2, state.jugglingCount - 1);
              state.missPulse = 1;
              tone(145, .15, "sawtooth", .02);
              setTimeout(nextPropRequest, 600);
            }
          }
          if (state.phaseTime >= actDurations.juggle) enterPhase("aerial");
        } else if (state.phase === "aerial") {
          if (state.ropeHeld) {
            state.rope += dt / 1450 * state.ropeDirection;
            if (state.rope >= 1) {
              state.rope = 1;
              state.ropeDirection = -1;
            } else if (state.rope <= .08) {
              state.rope = .08;
              state.ropeDirection = 1;
            }
          }
          ropeFill.style.height = `${state.rope * 92}%`;
          if (state.phaseTime >= actDurations.aerial) enterPhase("fire");
        } else if (state.phase === "fire") {
          state.fire += (state.bellowsHeld ? dt / 2600 : -dt / 3900);
          state.fire += Math.sin(state.phaseTime / 360) * dt / 18000;
          state.fire = Math.max(.05, Math.min(1, state.fire));
          const inBand = state.fire >= .48 && state.fire <= .76;
          if (inBand) {
            state.fireQuality += dt;
            if (Math.floor(state.phaseTime / 650) !== Math.floor((state.phaseTime - dt) / 650)) {
              state.score += 1.4;
              state.mood = Math.min(5, state.mood + .06);
            }
          } else if (state.fire > .9) {
            state.mood = Math.max(0, state.mood - dt / 6000);
          }
          state.fireSamples += dt;
          fireFill.style.width = `${state.fire * 94}%`;
          if (state.phaseTime >= actDurations.fire) {
            const quality = state.fireQuality / Math.max(1, state.fireSamples);
            state.score += quality * 16;
            state.mood = Math.min(5, state.mood + quality);
            enterPhase("finale");
          }
        } else if (state.phase === "finale" && state.phaseTime > 2400) {
          state.phaseTime = -99999;
        }

        const progress = Math.min(1, state.elapsed / totalDuration);
        progressFill.style.width = `${progress * 100}%`;
        scoreText.textContent = Math.round(state.score);
        faceNodes.forEach((face, index) => {
          face.classList.toggle("on", index < Math.round(state.mood));
        });
      }

      function roundedRect(x, y, w, h, r) {
        ctx.beginPath();
        ctx.roundRect(x, y, w, h, r);
      }

      function drawBackground() {
        const gradient = ctx.createLinearGradient(0, 0, 0, 720);
        gradient.addColorStop(0, "#321915");
        gradient.addColorStop(.6, "#6e3026");
        gradient.addColorStop(1, "#1a100d");
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, 1280, 720);

        ctx.fillStyle = "#9f3b32";
        ctx.beginPath();
        ctx.moveTo(0, 0); ctx.lineTo(265, 0); ctx.quadraticCurveTo(190, 160, 118, 420);
        ctx.lineTo(0, 510); ctx.closePath(); ctx.fill();
        ctx.beginPath();
        ctx.moveTo(1280, 0); ctx.lineTo(1015, 0); ctx.quadraticCurveTo(1090, 160, 1162, 420);
        ctx.lineTo(1280, 510); ctx.closePath(); ctx.fill();

        ctx.strokeStyle = "#e3b95f";
        ctx.lineWidth = 5;
        ctx.beginPath();
        ctx.moveTo(0, 18);
        for (let x = 0; x <= 1280; x += 80) {
          ctx.quadraticCurveTo(x + 40, 70, x + 80, 18);
        }
        ctx.stroke();

        for (let x = 38; x < 1280; x += 80) {
          ctx.fillStyle = "#ffd467";
          ctx.beginPath();
          ctx.arc(x, 43, 8, 0, Math.PI * 2);
          ctx.fill();
          ctx.shadowColor = "#ffb43b";
          ctx.shadowBlur = 18;
          ctx.fill();
          ctx.shadowBlur = 0;
        }

        ctx.fillStyle = "#553a28";
        ctx.fillRect(140, 440, 1000, 115);
        ctx.fillStyle = "#7a5335";
        ctx.beginPath();
        ctx.ellipse(640, 450, 425, 120, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "#d2a157";
        ctx.lineWidth = 7;
        ctx.stroke();
        ctx.fillStyle = "#b97843";
        ctx.beginPath();
        ctx.ellipse(640, 436, 405, 100, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#6e3026";
        ctx.beginPath();
        ctx.moveTo(490, 405); ctx.lineTo(640, 350); ctx.lineTo(790, 405);
        ctx.lineTo(730, 510); ctx.lineTo(550, 510); ctx.closePath(); ctx.fill();
        ctx.fillStyle = "#e0a34a";
        ctx.beginPath();
        for (let i = 0; i < 16; i++) {
          const a = i * Math.PI / 8;
          const r = i % 2 ? 40 : 88;
          const x = 640 + Math.cos(a) * r;
          const y = 435 + Math.sin(a) * r * .58;
          if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.fill();
      }

      function drawAudience(t) {
        const rows = [
          { y: 618, count: 15, start: 75, gap: 82, scale: 1 },
          { y: 558, count: 13, start: 150, gap: 82, scale: .82 }
        ];
        rows.forEach((row, rowIndex) => {
          for (let i = 0; i < row.count; i++) {
            const x = row.start + i * row.gap;
            const bounce = state && state.crowdPulse
              ? Math.abs(Math.sin(t / 90 + i)) * 13 * state.crowdPulse
              : Math.sin(t / 650 + i) * 2;
            const s = row.scale;
            ctx.save();
            ctx.translate(x, row.y - bounce);
            ctx.scale(s, s);
            const colors = ["#315d6b", "#76533a", "#536c48", "#9a4b3c"];
            ctx.fillStyle = colors[(i + rowIndex) % colors.length];
            roundedRect(-25, -20, 50, 58, 14); ctx.fill();
            ctx.fillStyle = ["#c98f62", "#e4bc83", "#9f684e"][i % 3];
            ctx.beginPath(); ctx.arc(0, -36, 20, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = "#2a1b17";
            ctx.fillRect(-10, -41, 4, 4); ctx.fillRect(7, -41, 4, 4);
            if (state && state.mood > 2.5) {
              ctx.strokeStyle = "#2a1b17"; ctx.lineWidth = 3;
              ctx.beginPath(); ctx.arc(0, -33, 8, .15, Math.PI - .15); ctx.stroke();
            }
            if (state && state.crowdPulse > .1) {
              ctx.strokeStyle = "#d7a878"; ctx.lineWidth = 7; ctx.lineCap = "round";
              ctx.beginPath();
              ctx.moveTo(-22, 4); ctx.lineTo(-35, -22 - Math.sin(t / 80 + i) * 12);
              ctx.moveTo(22, 4); ctx.lineTo(35, -22 + Math.sin(t / 80 + i) * 12);
              ctx.stroke();
            }
            ctx.restore();
          }
        });
      }

      function drawPerson(x, y, color, pose = "idle", scale = 1) {
        ctx.save();
        ctx.translate(x, y);
        ctx.scale(scale, scale);
        const bob = pose === "juggle" ? Math.sin(performance.now() / 160) * 4 : 0;
        ctx.translate(0, bob);
        ctx.strokeStyle = "#251713";
        ctx.lineWidth = 8;
        ctx.lineCap = "round";
        ctx.fillStyle = "#e7b984";
        ctx.beginPath(); ctx.arc(0, -105, 29, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
        ctx.fillStyle = "#2c201a";
        ctx.beginPath(); ctx.arc(0, -115, 29, Math.PI, Math.PI * 2); ctx.fill();
        ctx.fillStyle = color;
        roundedRect(-29, -74, 58, 88, 20); ctx.fill(); ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(-17, 10); ctx.lineTo(-20, 73);
        ctx.moveTo(17, 10); ctx.lineTo(20, 73);
        if (pose === "juggle") {
          ctx.moveTo(-24, -55); ctx.lineTo(-62, -91);
          ctx.moveTo(24, -55); ctx.lineTo(62, -91);
        } else if (pose === "fire") {
          ctx.moveTo(-24, -54); ctx.lineTo(-52, -20);
          ctx.moveTo(24, -54); ctx.lineTo(62, -48);
        } else {
          ctx.moveTo(-24, -54); ctx.lineTo(-44, -14);
          ctx.moveTo(24, -54); ctx.lineTo(44, -14);
        }
        ctx.stroke();
        ctx.fillStyle = "#211712";
        ctx.beginPath(); ctx.arc(-9, -108, 3.5, 0, Math.PI * 2); ctx.arc(9, -108, 3.5, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
      }

      function drawJuggling(t) {
        drawPerson(640, 412, "#315d6b", "juggle", 1);
        const count = state ? state.jugglingCount : 3;
        for (let i = 0; i < count; i++) {
          const a = t / 520 + i * Math.PI * 2 / count;
          const x = 640 + Math.cos(a) * 95;
          const y = 270 - Math.abs(Math.sin(a)) * 105 + (i % 2) * 8;
          ctx.fillStyle = ["#f2bb4f", "#ae4034", "#d9e0bb"][i % 3];
          ctx.beginPath();
          ctx.arc(x, y, 13, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = "#281713"; ctx.lineWidth = 4; ctx.stroke();
        }
      }

      function drawAerial(t) {
        ctx.strokeStyle = "#d7bd8a";
        ctx.lineWidth = 7;
        ctx.beginPath(); ctx.moveTo(640, 0); ctx.lineTo(640, 208); ctx.stroke();
        ctx.strokeStyle = "#edc267";
        ctx.lineWidth = 10;
        ctx.beginPath(); ctx.arc(640, 247, 54, 0, Math.PI * 2); ctx.stroke();
        const jump = state ? Math.sin(state.aerialJump * Math.PI) : 0;
        const sway = Math.sin(t / 510) * 34;
        ctx.save();
        ctx.translate(640 + sway, 330 - jump * 125);
        ctx.rotate(Math.sin(t / 510) * .13 + jump * .6);
        drawPerson(0, 0, "#8f3e6f", "idle", .78);
        ctx.restore();
      }

      function drawFire(t) {
        drawPerson(555, 420, "#536c48", "fire", .92);
        drawPerson(735, 420, "#a83d34", "fire", .92);
        const power = state ? state.fire : .35;
        const flameX = 640;
        const flameY = 305;
        const wobble = Math.sin(t / 70) * 12;
        const height = 45 + power * 155;
        ctx.save();
        ctx.translate(flameX, flameY + 65);
        ctx.fillStyle = "#bd3d2d";
        ctx.beginPath();
        ctx.moveTo(0, -height);
        ctx.quadraticCurveTo(55 + wobble, -height * .45, 22, 0);
        ctx.quadraticCurveTo(0, 22, -25, 0);
        ctx.quadraticCurveTo(-55 + wobble, -height * .45, 0, -height);
        ctx.fill();
        ctx.fillStyle = "#f2b541";
        ctx.beginPath();
        ctx.moveTo(0, -height * .72);
        ctx.quadraticCurveTo(25, -height * .3, 10, 0);
        ctx.quadraticCurveTo(0, 10, -12, 0);
        ctx.quadraticCurveTo(-24, -height * .3, 0, -height * .72);
        ctx.fill();
        ctx.restore();
      }

      function drawWaiting() {
        drawPerson(540, 412, "#315d6b", "idle", .9);
        drawPerson(640, 412, "#8f3e6f", "idle", .9);
        drawPerson(740, 412, "#536c48", "idle", .9);
      }

      function draw(t) {
        ctx.clearRect(0, 0, 1280, 720);
        drawBackground();
        if (!state || state.phase === "intro") {
          drawWaiting();
        } else if (state.phase === "juggle") {
          drawJuggling(t);
        } else if (state.phase === "aerial") {
          drawAerial(t);
        } else if (state.phase === "fire") {
          drawFire(t);
        } else {
          drawWaiting();
        }
        drawAudience(t);
        if (state && state.missPulse > 0) {
          ctx.fillStyle = `rgba(83, 21, 18, ${state.missPulse * .27})`;
          ctx.fillRect(0, 0, 1280, 720);
        }
      }

      function loop(now) {
        const dt = Math.min(40, now - lastTime);
        lastTime = now;
        update(dt);
        draw(now);
        raf = requestAnimationFrame(loop);
      }

      document.querySelectorAll(".prop").forEach(button => {
        button.addEventListener("click", () => chooseProp(button.dataset.prop, button));
      });

      const holdRope = event => {
        if (state?.phase !== "aerial") return;
        event.preventDefault();
        state.ropeHeld = true;
        state.ropeDirection = 1;
        ropeLever.classList.add("held");
        ropeLever.setPointerCapture?.(event.pointerId);
        tone(240, .05, "square", .015);
      };

      ropeLever.addEventListener("pointerdown", holdRope);
      ropeLever.addEventListener("pointerup", releaseRope);
      ropeLever.addEventListener("pointercancel", releaseRope);
      ropeLever.addEventListener("lostpointercapture", releaseRope);

      const holdBellows = event => {
        if (state?.phase !== "fire") return;
        event.preventDefault();
        state.bellowsHeld = true;
        bellows.classList.add("held");
        bellows.setPointerCapture?.(event.pointerId);
        tone(95, .06, "sawtooth", .012);
      };

      const releaseBellows = () => {
        if (!state) return;
        state.bellowsHeld = false;
        bellows.classList.remove("held");
      };

      bellows.addEventListener("pointerdown", holdBellows);
      bellows.addEventListener("pointerup", releaseBellows);
      bellows.addEventListener("pointercancel", releaseBellows);
      bellows.addEventListener("lostpointercapture", releaseBellows);

      startButton.addEventListener("click", startShow);
      replayButton.addEventListener("click", startShow);

      state = freshState();
      draw(performance.now());
    })();
  </script>
</body>
</html>
